<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>日程安排 - mako的学习记录</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- 樱花飘落容器 -->
  <div class="sakura-container" id="sakuraContainer"></div>

  <!-- 导航栏 -->
  <nav class="navbar">
    <div class="nav-content">
      <a href="index.html" class="nav-logo">🌸 mako's Learning</a>
      <ul class="nav-links">
        <li><a href="index.html">首页</a></li>
        <li><a href="notes.html">课程笔记</a></li>
        <li><a href="homework.html">课程作业</a></li>
        <li><a href="schedule.html" class="active">日程</a></li>
        <li><a href="help.html">帮助</a></li>
      </ul>
    </div>
  </nav>

  <!-- 主要内容 -->
  <main class="main-content">
    <!-- 待办事项区 -->
    <section class="section schedule-section">
      <div class="container">
        <h2 class="section-title fade-in">📋 待办事项</h2>

        <!-- 添加待办表单 -->
        <div class="todo-add-form fade-in">
          <input type="text" id="todoInput" class="todo-input" placeholder="添加新的待办事项...">
          <input type="date" id="todoDueDate" class="todo-date-input" title="截止日期" placeholder="截止日期">
          <select id="todoCourse" class="todo-course-select" title="关联课程">
            <option value="">无关联课程</option>
          </select>
          <button type="button" id="addTodoBtn" class="course-btn">添加</button>
        </div>

        <!-- 筛选器 -->
        <div class="todo-filters fade-in">
          <button type="button" class="filter-btn active" data-filter="all">全部</button>
          <button type="button" class="filter-btn" data-filter="today">今天</button>
          <button type="button" class="filter-btn" data-filter="upcoming">即将到期</button>
          <button type="button" class="filter-btn" data-filter="completed">已完成</button>
        </div>

        <!-- 待办列表 -->
        <div class="todo-list" id="todoList">
        </div>
      </div>
    </section>

    <!-- 课程表区 -->
    <section class="section table-section">
      <div class="container">
        <h2 class="section-title fade-in">📅 课程表</h2>

        <!-- 周选择器 -->
        <div class="week-selector fade-in">
          <button type="button" id="prevWeekBtn" class="week-nav-btn">◀ 上一周</button>
          <select id="weekSelect" class="week-select" title="选择学习周次">
            <!-- 周选项将由 JavaScript 渲染 -->
          </select>
          <span id="weekDateRange" class="week-date-range"></span>
          <button type="button" id="nextWeekBtn" class="week-nav-btn">下一周 ▶</button>
          <button type="button" id="todayWeekBtn" class="course-btn-secondary">本周</button>
        </div>

        <!-- 单双周选择 -->
        <div class="week-type-selector fade-in">
          <label><input type="radio" name="weekType" value="all" checked> 全部</label>
          <label><input type="radio" name="weekType" value="odd"> 单周</label>
          <label><input type="radio" name="weekType" value="even"> 双周</label>
        </div>

        <!-- 学期进度条 -->
        <div class="semester-progress fade-in" id="semesterProgress">
          <div class="progress-info">
            <span class="progress-label">📊 学期进度</span>
            <span class="progress-text" id="progressText">第 1 周 / 共 20 周</span>
            <button type="button" class="progress-settings-btn" onclick="openSemesterSettings()">⚙️ 设置</button>
          </div>
          <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
          </div>
        </div>

        <!-- 本周概览 -->
        <div class="week-overview fade-in" id="weekOverview">
          <h3 class="overview-title">📋 本周概览</h3>
          <div class="overview-content" id="overviewContent">
            <!-- 概览内容由 JavaScript 渲染 -->
          </div>
        </div>

        <!-- 课程表 -->
        <div class="table-wrapper fade-in">
          <table class="course-table" id="courseTable">
            <thead>
              <tr>
                <th class="time-col">时间</th>
                <th>周一</th>
                <th>周二</th>
                <th>周三</th>
                <th>周四</th>
                <th>周五</th>
                <th>周六</th>
                <th>周日</th>
              </tr>
            </thead>
            <tbody id="courseTableBody">
            </tbody>
          </table>
        </div>

        <!-- 添加课程项按钮 -->
        <div class="table-add-section fade-in">
          <button type="button" id="addTableItemBtn" class="course-btn">➕ 添加课程项</button>
        </div>
      </div>
    </section>
  </main>

  <!-- 添加课程项模态框 -->
  <div id="addTableItemModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3>添加课程</h3>
        <button type="button" class="modal-close" onclick="closeTableItemModal()">&times;</button>
      </div>
      <form id="addTableItemForm" class="modal-form">
        <div class="form-group">
          <label for="tableItemCourse">选择课程 *</label>
          <select id="tableItemCourse" required>
            <option value="">请选择课程</option>
          </select>
        </div>
        <div class="form-group">
          <label for="tableItemDay">星期 *</label>
          <select id="tableItemDay" required>
            <option value="0">周一</option>
            <option value="1">周二</option>
            <option value="2">周三</option>
            <option value="3">周四</option>
            <option value="4">周五</option>
            <option value="5">周六</option>
            <option value="6">周日</option>
          </select>
        </div>
        <div class="form-group">
          <label for="tableItemPeriod">节次 *</label>
          <select id="tableItemPeriod" required>
            <option value="0">1-2 节 (08:00-09:40)</option>
            <option value="1">3-4 节 (10:00-11:40)</option>
            <option value="2">5-6 节 (14:00-15:40)</option>
            <option value="3">7-8 节 (16:00-17:40)</option>
            <option value="4">9-10 节 (18:30-20:00)</option>
            <option value="5">11-12 节 (20:10-21:40)</option>
          </select>
        </div>
        <div class="form-group">
          <label for="tableItemWeekType">周次</label>
          <select id="tableItemWeekType">
            <option value="all">全部周</option>
            <option value="odd">单周</option>
            <option value="even">双周</option>
          </select>
        </div>
        <div class="form-group">
          <label for="tableItemLocation">上课地点</label>
          <input type="text" id="tableItemLocation" placeholder="例如：教学楼A101">
        </div>
        <div class="form-group">
          <label for="tableItemNote">备注</label>
          <input type="text" id="tableItemNote" placeholder="其他备注信息">
        </div>
        <div class="form-actions">
          <button type="button" class="course-btn-secondary" onclick="closeTableItemModal()">取消</button>
          <button type="submit" class="course-btn">添加</button>
        </div>
      </form>
    </div>
  </div>

  <!-- 编辑时间节次模态框 -->
  <div id="editPeriodModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3>编辑时间节次</h3>
        <button type="button" class="modal-close" onclick="closePeriodModal()">&times;</button>
      </div>
      <form id="editPeriodForm" class="modal-form">
        <input type="hidden" id="editPeriodId">
        <div class="form-group">
          <label for="editPeriodName">节次名称</label>
          <input type="text" id="editPeriodName" placeholder="例如：1-2节">
        </div>
        <div class="form-group">
          <label for="editPeriodTime">上课时间</label>
          <input type="text" id="editPeriodTime" placeholder="例如：08:00-09:40">
        </div>
        <div class="form-actions">
          <button type="button" class="course-btn-delete" onclick="deletePeriod()">🗑️ 删除</button>
          <button type="button" class="course-btn-secondary" onclick="closePeriodModal()">取消</button>
          <button type="submit" class="course-btn">保存</button>
        </div>
      </form>
    </div>
  </div>

  <!-- 学期设置模态框 -->
  <div id="semesterSettingsModal" class="modal">
    <div class="modal-content modal-content-sm">
      <div class="modal-header">
        <h3>学期设置</h3>
        <button type="button" class="modal-close" onclick="closeSemesterSettings()">&times;</button>
      </div>
      <form id="semesterSettingsForm" class="modal-form">
        <div class="form-group">
          <label for="semesterStartDate">学期开始日期</label>
          <input type="date" id="semesterStartDate" required>
        </div>
        <div class="form-group">
          <label for="semesterTotalWeeks">学期总周数</label>
          <input type="number" id="semesterTotalWeeks" min="1" max="30" value="20" required>
        </div>
        <div class="form-actions">
          <button type="button" class="course-btn-secondary" onclick="closeSemesterSettings()">取消</button>
          <button type="submit" class="course-btn">保存</button>
        </div>
      </form>
    </div>
  </div>

  <!-- 页脚 -->
  <footer class="footer">
    <div class="container">
      <p>mako's Learning · 2026</p>
      <p class="footer-note">漫步于樱花之森下</p>
    </div>
  </footer>

  <script src="courses.js"></script>
  <script src="utils.js" defer></script>
  <script src="script.js"></script>
  <script>
    // ===== 待办事项功能 =====
    const TODOS_KEY = 'user_todos';
    let currentFilter = 'all';

    function loadTodos() {
      return JSON.parse(localStorage.getItem(TODOS_KEY) || '[]');
    }

    function saveTodos(todos) {
      localStorage.setItem(TODOS_KEY, JSON.stringify(todos));
    }

    function addTodo(text, dueDate, courseId) {
      const todos = loadTodos();
      const todo = {
        id: 'todo_' + Date.now(),
        text,
        dueDate,
        courseId,
        completed: false,
        createdAt: new Date().toISOString()
      };
      todos.push(todo);
      saveTodos(todos);
      return todo;
    }

    function toggleTodo(todoId) {
      const todos = loadTodos();
      const todo = todos.find(t => t.id === todoId);
      if (todo) {
        todo.completed = !todo.completed;
        saveTodos(todos);
        if (todo.homeworkId) {
          const homework = JSON.parse(localStorage.getItem('course_homework') || '[]');
          const hw = homework.find(h => h.id === todo.homeworkId);
          if (hw) {
            hw.completed = todo.completed;
            localStorage.setItem('course_homework', JSON.stringify(homework));
          }
        }
      }
    }

    function deleteTodo(todoId) {
      const todos = loadTodos();
      const todo = todos.find(t => t.id === todoId);
      const filtered = todos.filter(t => t.id !== todoId);
      saveTodos(filtered);
      if (todo && todo.homeworkId) {
        const homework = JSON.parse(localStorage.getItem('course_homework') || '[]');
        const filteredHw = homework.filter(h => h.id !== todo.homeworkId);
        localStorage.setItem('course_homework', JSON.stringify(filteredHw));
      }
    }

    function getDueDateStatus(dueDate) {
      if (!dueDate) return 'none';
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      const due = new Date(dueDate);
      due.setHours(0, 0, 0, 0);
      const diff = due.getTime() - today.getTime();
      const days = Math.ceil(diff / (1000 * 60 * 60 * 24));
      if (days < 0) return 'overdue';
      if (days === 0) return 'today';
      if (days <= 3) return 'soon';
      return 'future';
    }

    function filterTodos(todos, filter) {
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      return todos.filter(todo => {
        if (filter === 'completed') return todo.completed;
        if (filter === 'today') {
          if (!todo.dueDate || todo.completed) return false;
          const due = new Date(todo.dueDate);
          due.setHours(0, 0, 0, 0);
          return due.getTime() === today.getTime();
        }
        if (filter === 'upcoming') {
          if (!todo.dueDate || todo.completed) return false;
          const due = new Date(todo.dueDate);
          due.setHours(0, 0, 0, 0);
          const diff = due.getTime() - today.getTime();
          return diff >= 0 && diff <= 3 * 24 * 60 * 60 * 1000;
        }
        return true;
      });
    }

    function renderTodos() {
      const todoList = document.getElementById('todoList');
      let todos = loadTodos();
      todos = filterTodos(todos, currentFilter);
      todos.sort((a, b) => {
        if (a.completed !== b.completed) return a.completed ? 1 : -1;
        if (a.dueDate && b.dueDate) return new Date(a.dueDate) - new Date(b.dueDate);
        return 0;
      });

      if (todos.length === 0) {
        todoList.innerHTML = '<div class="todo-empty"><span class="empty-icon">📋</span><p class="empty-title">暂无待办事项</p><p>在上方输入内容添加新的待办</p></div>';
        return;
      }

      todoList.innerHTML = todos.map(todo => {
        const status = getDueDateStatus(todo.dueDate);
        const statusClass = status === 'overdue' ? 'overdue' : status === 'today' ? 'today' : status === 'soon' ? 'soon' : '';
        const statusText = status === 'overdue' ? '已过期' : status === 'today' ? '今天到期' : status === 'soon' ? '即将到期' : '';
        const course = getCourseById(todo.courseId);

        return `
          <div class="todo-item ${todo.completed ? 'completed' : ''}">
            <label class="todo-checkbox">
              <input type="checkbox" ${todo.completed ? 'checked' : ''} onchange="handleToggleTodo('${todo.id}')">
              <span class="checkmark"></span>
            </label>
            <div class="todo-content">
              <span class="todo-text">${todo.text}</span>
              <div class="todo-meta">
                ${todo.dueDate ? `<span class="todo-date ${statusClass}">${todo.dueDate} ${statusText}</span>` : ''}
                ${course ? `<span class="todo-course">${course.icon} ${course.name}</span>` : ''}
              </div>
            </div>
            <button type="button" class="todo-delete" onclick="handleDeleteTodo('${todo.id}')">🗑️</button>
          </div>
        `;
      }).join('');
    }

    function handleAddTodo() {
      const input = document.getElementById('todoInput');
      const dateInput = document.getElementById('todoDueDate');
      const courseSelect = document.getElementById('todoCourse');
      const text = input.value.trim();
      if (!text) return;
      addTodo(text, dateInput.value || null, courseSelect.value || null);
      input.value = '';
      dateInput.value = '';
      courseSelect.value = '';
      renderTodos();
    }

    function handleToggleTodo(todoId) {
      toggleTodo(todoId);
      renderTodos();
    }

    function handleDeleteTodo(todoId) {
      if (confirm('确定要删除这个待办吗？')) {
        deleteTodo(todoId);
        renderTodos();
      }
    }

    function initFilterButtons() {
      document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', function() {
          document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
          this.classList.add('active');
          currentFilter = this.dataset.filter;
          renderTodos();
        });
      });
    }

    function initTodoCourseSelect() {
      const select = document.getElementById('todoCourse');
      const courses = getCoursesArray();
      select.innerHTML = '<option value="">无关联课程</option>' +
        courses.map(c => `<option value="${c.id}">${c.icon} ${c.name}</option>`).join('');
    }

    // ===== 课程表功能 =====
    const TABLE_ITEMS_KEY = 'course_table_items';
    const PERIODS_KEY = 'course_periods';
    const SEMESTER_KEY = 'semester_settings';

    const DEFAULT_SEMESTER = {
      startDate: '2026-03-02',
      totalWeeks: 20
    };

    function getSemesterSettings() {
      const saved = localStorage.getItem(SEMESTER_KEY);
      if (saved) return JSON.parse(saved);
      return DEFAULT_SEMESTER;
    }

    function saveSemesterSettings(settings) {
      localStorage.setItem(SEMESTER_KEY, JSON.stringify(settings));
    }

    const DEFAULT_PERIODS = [
      { id: 0, name: '1-2节', time: '08:00-09:40' },
      { id: 1, name: '3-4节', time: '10:00-11:40' },
      { id: 2, name: '5-6节', time: '14:00-15:40' },
      { id: 3, name: '7-8节', time: '16:00-17:40' },
      { id: 4, name: '9-10节', time: '18:30-20:00' },
      { id: 5, name: '11-12节', time: '20:10-21:40' }
    ];

    function getPeriods() {
      const saved = localStorage.getItem(PERIODS_KEY);
      if (saved) return JSON.parse(saved);
      return DEFAULT_PERIODS;
    }

    function savePeriods(periods) {
      localStorage.setItem(PERIODS_KEY, JSON.stringify(periods));
    }

    const PERIODS = getPeriods();
    const DAYS = ['周一', '周二', '周三', '周四', '周五', '周六', '周日'];

    let currentWeekOffset = 0;
    let currentWeekType = 'all';

    function loadTableItems() {
      return JSON.parse(localStorage.getItem(TABLE_ITEMS_KEY) || '[]');
    }

    function saveTableItems(items) {
      localStorage.setItem(TABLE_ITEMS_KEY, JSON.stringify(items));
    }

    function getWeekNumber(weekOffset) {
      return weekOffset + 1;
    }

    function isCurrentWeekOdd(weekOffset) {
      const weekNum = getWeekNumber(weekOffset);
      return weekNum % 2 === 1;
    }

    function getWeekStartDate(weekOffset) {
      const semester = getSemesterSettings();
      const d = new Date(semester.startDate);
      d.setDate(d.getDate() + weekOffset * 7);
      return d;
    }

    function getWeekEndDate(weekOffset) {
      const d = getWeekStartDate(weekOffset);
      d.setDate(d.getDate() + 6);
      return d;
    }

    function formatDate(d) {
      return `${d.getMonth() + 1}月${d.getDate()}日`;
    }

    function renderWeekSelect() {
      const select = document.getElementById('weekSelect');
      const semester = getSemesterSettings();
      const options = [];
      // 只显示第1周到学期结束周
      const maxOffset = semester.totalWeeks - 1;
      for (let i = 0; i <= maxOffset; i++) {
        const start = getWeekStartDate(i);
        const end = getWeekEndDate(i);
        const label = `第${getWeekNumber(i)}周 (${formatDate(start)}-${formatDate(end)})`;
        options.push(`<option value="${i}">${label}</option>`);
      }
      select.innerHTML = options.join('');
      // 确保当前周在有效范围内
      if (currentWeekOffset > maxOffset) currentWeekOffset = maxOffset;
      if (currentWeekOffset < 0) currentWeekOffset = 0;
      select.value = currentWeekOffset;
    }

    function updateWeekDateRange() {
      const start = getWeekStartDate(currentWeekOffset);
      const end = getWeekEndDate(currentWeekOffset);
      document.getElementById('weekDateRange').textContent = `${formatDate(start)} - ${formatDate(end)}`;
    }

    function renderCourseTable() {
      const tbody = document.getElementById('courseTableBody');
      const items = loadTableItems();
      const weekNum = getWeekNumber(currentWeekOffset);
      const isOddWeek = weekNum % 2 === 1;

      let html = '';
      const periods = getPeriods();
      periods.forEach((period, pIndex) => {
        html += '<tr>';
        html += `<td class="time-cell clickable" onclick="openPeriodModal(${period.id})">
          <div class="period-name">${period.name}</div>
          <div class="period-time">${period.time}</div>
        </td>`;

        DAYS.forEach((day, dIndex) => {
          const cellItems = items.filter(item => {
            if (item.day != dIndex || item.period != pIndex) return false;
            if (item.weekType === 'all') return true;
            if (item.weekType === 'odd') return isOddWeek;
            if (item.weekType === 'even') return !isOddWeek;
            return true;
          });

          if (cellItems.length === 0) {
            html += `<td class="course-cell empty-cell" data-day="${dIndex}" data-period="${pIndex}" onclick="openTableItemModal(${dIndex}, ${pIndex})">+</td>`;
          } else {
            html += `<td class="course-cell" data-day="${dIndex}" data-period="${pIndex}">`;
            cellItems.forEach(item => {
              const course = getCourseById(item.courseId);
              const courseName = course ? course.name : item.courseName || '未知课程';
              const courseIcon = course ? course.icon : '📚';
              const weekTypeLabel = item.weekType === 'odd' ? '(单)' : item.weekType === 'even' ? '(双)' : '';
              const isActive = item.weekType === 'all' || (item.weekType === 'odd' === isOddWeek);
              const opacity = isActive ? '' : 'class="dimmed"';

              html += `
                <div class="table-course-item ${isActive ? '' : 'dimmed'}" onclick="event.stopPropagation()">
                  <span class="table-course-icon">${courseIcon}</span>
                  <span class="table-course-name">${courseName} ${weekTypeLabel}</span>
                  ${item.location ? `<span class="table-course-location">📍${item.location}</span>` : ''}
                  ${item.note ? `<span class="table-course-note">${item.note}</span>` : ''}
                  <button class="table-course-delete" onclick="deleteTableItem('${item.id}')">×</button>
                </div>
              `;
            });
            html += '</td>';
          }
        });
        html += '</tr>';
      });
      tbody.innerHTML = html;
    }

    function openTableItemModal(day = null, period = null) {
      const courseSelect = document.getElementById('tableItemCourse');
      const courses = getCoursesArray();
      courseSelect.innerHTML = '<option value="">请选择课程</option>' +
        courses.map(c => `<option value="${c.id}">${c.icon} ${c.name}</option>`).join('');

      if (day !== null) document.getElementById('tableItemDay').value = day;
      if (period !== null) document.getElementById('tableItemPeriod').value = period;

      document.getElementById('addTableItemModal').style.display = 'flex';
    }

    function closeTableItemModal() {
      document.getElementById('addTableItemModal').style.display = 'none';
    }

    function handleAddTableItem(e) {
      e.preventDefault();
      const courseId = document.getElementById('tableItemCourse').value;
      const day = parseInt(document.getElementById('tableItemDay').value);
      const period = parseInt(document.getElementById('tableItemPeriod').value);
      const weekType = document.getElementById('tableItemWeekType').value;
      const location = document.getElementById('tableItemLocation').value.trim();
      const note = document.getElementById('tableItemNote').value.trim();

      if (!courseId) {
        alert('请选择课程');
        return;
      }

      const items = loadTableItems();
      const course = getCourseById(courseId);
      items.push({
        id: 'ti_' + Date.now(),
        courseId,
        courseName: course ? course.name : '',
        day,
        period,
        weekType,
        location,
        note,
        createdAt: new Date().toISOString()
      });
      saveTableItems(items);
      closeTableItemModal();
      renderCourseTable();

      document.getElementById('addTableItemForm').reset();
    }

    function deleteTableItem(itemId) {
      if (!confirm('确定要删除这个课程项吗？')) return;
      const items = loadTableItems();
      const filtered = items.filter(item => item.id !== itemId);
      saveTableItems(filtered);
      renderCourseTable();
    }

    // 时间节次编辑
    let editingPeriodId = null;

    function openPeriodModal(periodId) {
      editingPeriodId = periodId;
      const periods = getPeriods();
      const period = periods.find(p => p.id === periodId);
      if (!period) return;
      document.getElementById('editPeriodId').value = periodId;
      document.getElementById('editPeriodName').value = period.name;
      document.getElementById('editPeriodTime').value = period.time;
      document.getElementById('editPeriodModal').style.display = 'flex';
    }

    function closePeriodModal() {
      document.getElementById('editPeriodModal').style.display = 'none';
      editingPeriodId = null;
    }

    function handleEditPeriod(e) {
      e.preventDefault();
      const periodId = parseInt(document.getElementById('editPeriodId').value);
      const name = document.getElementById('editPeriodName').value.trim();
      const time = document.getElementById('editPeriodTime').value.trim();
      if (!name || !time) {
        alert('请填写节次名称和时间');
        return;
      }
      const periods = getPeriods();
      const idx = periods.findIndex(p => p.id === periodId);
      if (idx !== -1) {
        periods[idx].name = name;
        periods[idx].time = time;
        savePeriods(periods);
        closePeriodModal();
        renderCourseTable();
      }
    }

    function deletePeriod() {
      if (!confirm('确定要删除这个时间节次吗？课程表中的课程项不会被删除。')) return;
      const periodId = parseInt(document.getElementById('editPeriodId').value);
      const periods = getPeriods();
      const filtered = periods.filter(p => p.id !== periodId);
      savePeriods(filtered);
      closePeriodModal();
      renderCourseTable();
    }

    // 学期设置
    function openSemesterSettings() {
      const semester = getSemesterSettings();
      document.getElementById('semesterStartDate').value = semester.startDate;
      document.getElementById('semesterTotalWeeks').value = semester.totalWeeks;
      document.getElementById('semesterSettingsModal').style.display = 'flex';
    }

    function closeSemesterSettings() {
      document.getElementById('semesterSettingsModal').style.display = 'none';
    }

    function handleSemesterSettings(e) {
      e.preventDefault();
      const startDate = document.getElementById('semesterStartDate').value;
      const totalWeeks = parseInt(document.getElementById('semesterTotalWeeks').value);
      saveSemesterSettings({ startDate, totalWeeks });
      closeSemesterSettings();
      renderWeekSelect();
      updateWeekDateRange();
      updateSemesterProgress();
      renderWeekOverview();
      renderCourseTable();
    }

    // 计算当前是第几周（从学期开始计算）
    function getCurrentWeekFromSemester() {
      const semester = getSemesterSettings();
      const start = new Date(semester.startDate);
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      start.setHours(0, 0, 0, 0);
      const diffTime = today.getTime() - start.getTime();
      const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));
      return Math.floor(diffDays / 7);
    }

    // 学期进度更新
    function updateSemesterProgress() {
      const semester = getSemesterSettings();
      const currentWeekOffset = getCurrentWeekFromSemester();
      const weekNum = getWeekNumber(currentWeekOffset);
      const totalWeeks = semester.totalWeeks;
      const percent = Math.min(100, Math.max(0, (weekNum / totalWeeks) * 100));

      const today = new Date();
      const todayStr = `${today.getMonth() + 1}月${today.getDate()}日`;

      document.getElementById('progressText').textContent = `📅 ${todayStr} | 第 ${weekNum} 周 / 共 ${totalWeeks} 周`;
      document.getElementById('progressFill').style.width = percent + '%';
    }

    // 本周概览渲染
    function renderWeekOverview() {
      const container = document.getElementById('overviewContent');
      const items = loadTableItems();
      const semester = getSemesterSettings();
      const weekNum = getWeekNumber(currentWeekOffset);
      const isOddWeek = weekNum % 2 === 1;

      // 获取本周每天的课程
      const weekCourses = [];
      for (let d = 0; d < 7; d++) {
        const dayCourses = items.filter(item => {
          if (item.day != d) return false;
          if (item.weekType === 'all') return true;
          if (item.weekType === 'odd') return isOddWeek;
          if (item.weekType === 'even') return !isOddWeek;
          return true;
        });
        if (dayCourses.length > 0) {
          weekCourses.push({ day: DAYS[d], courses: dayCourses });
        }
      }

      if (weekCourses.length === 0) {
        container.innerHTML = '<p class="overview-empty">本周暂无课程安排</p>';
        return;
      }

      let html = '<div class="overview-list">';
      weekCourses.forEach(({ day, courses }) => {
        html += `<div class="overview-day">
          <div class="overview-day-name">${day}</div>
          <div class="overview-day-courses">`;
        courses.forEach(item => {
          const course = getCourseById(item.courseId);
          const period = getPeriods().find(p => p.id === item.period);
          const periodName = period ? period.name : '';
          const courseName = course ? `${course.icon} ${course.name}` : item.courseName || '未知课程';
          html += `<div class="overview-course-item">
            <span class="overview-period">${periodName}</span>
            <span class="overview-name">${courseName}</span>
            ${item.location ? `<span class="overview-location">📍${item.location}</span>` : ''}
          </div>`;
        });
        html += '</div></div>';
      });
      html += '</div>';
      container.innerHTML = html;
    }

    // 初始化
    document.addEventListener('DOMContentLoaded', function() {
      // 待办事项初始化
      initTodoCourseSelect();
      initFilterButtons();
      renderTodos();
      document.getElementById('addTodoBtn').addEventListener('click', handleAddTodo);
      document.getElementById('todoInput').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') handleAddTodo();
      });

      // 课程表初始化
      renderWeekSelect();
      updateWeekDateRange();
      renderCourseTable();

      // 周导航
      document.getElementById('prevWeekBtn').addEventListener('click', function() {
        currentWeekOffset--;
        renderWeekSelect();
        updateWeekDateRange();
        renderCourseTable();
      });

      document.getElementById('nextWeekBtn').addEventListener('click', function() {
        currentWeekOffset++;
        renderWeekSelect();
        updateWeekDateRange();
        renderCourseTable();
      });

      document.getElementById('todayWeekBtn').addEventListener('click', function() {
        currentWeekOffset = getCurrentWeekFromSemester();
        // 确保在有效范围内
        const semester = getSemesterSettings();
        if (currentWeekOffset < 0) currentWeekOffset = 0;
        if (currentWeekOffset >= semester.totalWeeks) currentWeekOffset = semester.totalWeeks - 1;
        renderWeekSelect();
        updateWeekDateRange();
        renderCourseTable();
        updateSemesterProgress();
      });

      document.getElementById('weekSelect').addEventListener('change', function() {
        currentWeekOffset = parseInt(this.value);
        updateWeekDateRange();
        renderCourseTable();
      });

      document.querySelectorAll('input[name="weekType"]').forEach(radio => {
        radio.addEventListener('change', function() {
          currentWeekType = this.value;
          renderCourseTable();
        });
      });

      // 添加课程项
      document.getElementById('addTableItemBtn').addEventListener('click', function() {
        openTableItemModal();
      });

      document.getElementById('addTableItemForm').addEventListener('submit', handleAddTableItem);
      document.getElementById('addTableItemModal').addEventListener('click', function(e) {
        if (e.target === this) closeTableItemModal();
      });

      // 时间节次编辑
      document.getElementById('editPeriodForm').addEventListener('submit', handleEditPeriod);
      document.getElementById('editPeriodModal').addEventListener('click', function(e) {
        if (e.target === this) closePeriodModal();
      });

      // 学期设置
      document.getElementById('semesterSettingsForm').addEventListener('submit', handleSemesterSettings);
      document.getElementById('semesterSettingsModal').addEventListener('click', function(e) {
        if (e.target === this) closeSemesterSettings();
      });

      // 初始化学期进度和本周概览
      updateSemesterProgress();
      renderWeekOverview();

      // 浏览器通知初始化
      initBrowserNotifications();
    });

    // ===== 浏览器通知 =====
    let notificationChecked = false;

    function initBrowserNotifications() {
      // 检查是否有即将到期的待办/作业
      const userSettings = JSON.parse(localStorage.getItem('user_settings') || '{}');

      // 如果用户没有明确拒绝，且有即将到期的项目，提示开启通知
      if (userSettings.notificationsEnabled !== false) {
        checkUpcomingDeadlines();
      }
    }

    function checkUpcomingDeadlines() {
      const todos = JSON.parse(localStorage.getItem('user_todos') || '[]');
      const homework = JSON.parse(localStorage.getItem('course_homework') || '[]');

      const today = new Date();
      today.setHours(0, 0, 0, 0);
      const tomorrow = new Date(today);
      tomorrow.setDate(tomorrow.getDate() + 1);

      // 找出今天或明天到期的未完成任务
      const upcoming = [...todos, ...homework].filter(item => {
        if (item.completed || !item.dueDate) return false;
        const due = new Date(item.dueDate);
        due.setHours(0, 0, 0, 0);
        return due.getTime() === today.getTime() || due.getTime() === tomorrow.getTime();
      });

      if (upcoming.length > 0 && Notification.permission === 'default') {
        // 提示用户开启通知
        if (confirm('您有即将到期的任务！是否开启浏览器通知以便及时提醒？')) {
          requestNotificationPermission();
        } else {
          const userSettings = JSON.parse(localStorage.getItem('user_settings') || '{}');
          userSettings.notificationsEnabled = false;
          localStorage.setItem('user_settings', JSON.stringify(userSettings));
        }
      }
    }

    function requestNotificationPermission() {
      Notification.requestPermission().then(permission => {
        if (permission === 'granted') {
          showNotification('通知已开启！', '您将在任务即将到期时收到提醒。');
          const userSettings = JSON.parse(localStorage.getItem('user_settings') || '{}');
          userSettings.notificationsEnabled = true;
          localStorage.setItem('user_settings', JSON.stringify(userSettings));
        }
      });
    }

    function showNotification(title, body) {
      if (Notification.permission === 'granted') {
        new Notification(title, { body, icon: '🌸' });
      }
    }
  </script>
</body>
</html>
