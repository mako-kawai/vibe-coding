<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>mako的学习记录</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- 樱花飘落容器 -->
  <div class="sakura-container" id="sakuraContainer"></div>

  <!-- 导航栏 -->
  <nav class="navbar">
    <div class="nav-content">
      <a href="index.html" class="nav-logo">🌸 mako's Learning</a>
      <ul class="nav-links">
        <li><a href="index.html" class="active">首页</a></li>
        <li><a href="notes.html">课程笔记</a></li>
        <li><a href="homework.html">课程作业</a></li>
        <li><a href="schedule.html">日程</a></li>
        <li><a href="help.html">帮助</a></li>
      </ul>
    </div>
  </nav>

  <!-- 主要内容 -->
  <main class="main-content">
    <!-- 个人介绍区 -->
    <section id="about" class="section about-section">
      <div class="container">
        <div class="about-card fade-in">
          <div class="avatar-wrapper">
            <div class="avatar">🌸</div>
          </div>
          <div class="about-info">
            <h1 class="name">mako</h1>
            <p class="nickname">柚子厨 · 枕批</p>
            <p class="bio">
              正在探索编程世界的学生。旮旯给木爱好者，
              希望创造有趣的作品。这是一个开始，希望在这里记录我的成长之路。
            </p>
            <div class="about-links">
              <a href="https://github.com" target="_blank" rel="noopener" class="github-link">
                <svg height="20" width="20" viewBox="0 0 24 24" fill="currentColor">
                  <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
                </svg>
                GitHub
              </a>
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- 我的课程区 -->
    <section id="courses" class="section courses-section">
      <div class="container">
        <div class="section-header fade-in">
          <h2 class="section-title">📚 我的课程</h2>
          <button type="button" id="addCourseBtn" class="course-btn">➕ 添加课程</button>
        </div>
        <div class="courses-grid" id="coursesGrid">
          <!-- 课程卡片将由 courses.js 动态渲染 -->
        </div>
      </div>
    </section>
  </main>

  <!-- 添加课程模态框 -->
  <div id="addCourseModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3>添加新课程</h3>
        <button type="button" class="modal-close" onclick="closeAddCourseModal()">&times;</button>
      </div>
      <form id="addCourseForm" class="modal-form">
        <div class="form-group">
          <label for="courseName">课程名称 *</label>
          <input type="text" id="courseName" required placeholder="例如：数据结构">
        </div>
        <div class="form-group">
          <label for="courseIcon">课程图标</label>
          <input type="text" id="courseIcon" placeholder="例如：📚" value="📚">
        </div>
        <div class="form-group">
          <label for="courseCredit">学分</label>
          <input type="number" id="courseCredit" min="1" max="10" value="3">
        </div>
        <div class="form-group">
          <label for="courseCategory">分类</label>
          <input type="text" id="courseCategory" placeholder="例如：计算机科学">
        </div>
        <div class="form-group">
          <label for="courseStatus">状态</label>
          <select id="courseStatus">
            <option value="upcoming">未开始</option>
            <option value="in-progress">学习中</option>
            <option value="completed">已完成</option>
          </select>
        </div>
        <div class="form-group">
          <label for="courseDesc">课程描述</label>
          <textarea id="courseDesc" rows="3" placeholder="课程的简单描述..."></textarea>
        </div>
        <div class="form-actions">
          <button type="button" class="course-btn-secondary" onclick="closeAddCourseModal()">取消</button>
          <button type="submit" class="course-btn">添加</button>
        </div>
      </form>
    </div>
  </div>

  <!-- 页脚 -->
  <footer class="footer">
    <div class="container">
      <p>mako's Learning · 2026</p>
      <p class="footer-note">漫步于樱花之森下</p>
    </div>
  </footer>

  <script src="courses.js"></script>
  <script src="script.js"></script>
  <script>
    // 初始化课程卡片
    document.addEventListener('DOMContentLoaded', function() {
      renderCourseCards('coursesGrid');

      // 添加课程按钮点击事件
      document.getElementById('addCourseBtn').addEventListener('click', function() {
        document.getElementById('addCourseModal').style.display = 'flex';
      });

      // 表单提交
      document.getElementById('addCourseForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const courseData = {
          name: document.getElementById('courseName').value,
          icon: document.getElementById('courseIcon').value || '📚',
          credit: parseInt(document.getElementById('courseCredit').value) || 3,
          category: document.getElementById('courseCategory').value || '自定义',
          status: document.getElementById('courseStatus').value,
          description: document.getElementById('courseDesc').value
        };
        addUserCourse(courseData);
        renderCourseCards('coursesGrid');
        closeAddCourseModal();
        this.reset();
      });

      // 点击模态框外部关闭
      document.getElementById('addCourseModal').addEventListener('click', function(e) {
        if (e.target === this) {
          closeAddCourseModal();
        }
      });
    });

    function closeAddCourseModal() {
      document.getElementById('addCourseModal').style.display = 'none';
    }
  </script>
</body>
</html>
