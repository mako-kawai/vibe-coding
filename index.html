  <!-- 添加课程模态框 -->

    <div class="modal-content">

        <h3>添加新课程</h3>

  <script>
    // 初始化课程卡片
    document.addEventListener('DOMContentLoaded', function() {
      renderCourseCards('coursesGrid');
      loadProfile();

      // 添加课程按钮点击事件
      document.getElementById('addCourseBtn').addEventListener('click', function() {
        document.getElementById('addCourseModal').style.display = 'flex';
      });

      // 表单提交
      document.getElementById('addCourseForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const courseData = {
          name: document.getElementById('courseName').value,
          icon: document.getElementById('courseIcon').value || '📚',
          credit: parseInt(document.getElementById('courseCredit').value) || 3,
          category: document.getElementById('courseCategory').value || '自定义',
          status: document.getElementById('courseStatus').value,
          description: document.getElementById('courseDesc').value
        };
        addUserCourse(courseData);
        renderCourseCards('coursesGrid');
        closeAddCourseModal();
        this.reset();
      });

      // 点击模态框外部关闭
      document.getElementById('addCourseModal').addEventListener('click', function(e) {
        if (e.target === this) {
          closeAddCourseModal();
        }
      });

      // 个人资料编辑
      document.getElementById('editProfileForm').addEventListener('submit', function(e) {
        e.preventDefault();
        saveProfile();
        closeProfileModal();
      });

      document.getElementById('avatarInput').addEventListener('change', handleAvatarUpload);

      document.getElementById('editProfileModal').addEventListener('click', function(e) {
        if (e.target === this) closeProfileModal();
      });

      // 编辑课程表单
      document.getElementById('editCourseForm').addEventListener('submit', handleEditCourse);
      document.getElementById('editCourseModal').addEventListener('click', function(e) {
        if (e.target === this) closeEditCourseModal();
      });

      // 课程详情添加作业表单
      document.getElementById('detailAddHomeworkForm').addEventListener('submit', handleDetailAddHomework);
      document.getElementById('detailAddHomeworkModal').addEventListener('click', function(e) {
        if (e.target === this) closeDetailAddHomeworkModal();
      });
    });

    function closeAddCourseModal() {
      document.getElementById('addCourseModal').style.display = 'none';
    }

    // ===== 个人资料功能 =====
    const PROFILE_KEY = 'user_profile';
    let cropCanvas, cropContext;
    let imgSelection = { x: 0, y: 0, w: 80, h: 80 };
    let isDragging = false;
    let originalImage = null;

    function loadProfile() {
      const profile = JSON.parse(localStorage.getItem(PROFILE_KEY) || 'null');
      if (profile) {
        if (profile.avatar) document.getElementById('profileAvatar').innerHTML = '<img src="' + profile.avatar + '" style="width:100%;height:100%;border-radius:50%;object-fit:cover;">';
        if (profile.name) document.getElementById('profileName').textContent = profile.name;
        if (profile.nickname) document.getElementById('profileNickname').textContent = profile.nickname;
        if (profile.bio) document.getElementById('profileBio').textContent = profile.bio;
        if (profile.github) document.getElementById('profileGithub').href = profile.github;
      }
    }

    function openProfileModal() {
      const profile = JSON.parse(localStorage.getItem(PROFILE_KEY) || 'null');
      document.getElementById('avatarPreview').innerHTML = profile && profile.avatar ?
        '<img src="' + profile.avatar + '" style="width:100%;height:100%;border-radius:50%;object-fit:cover;">' : '🌸';
      document.getElementById('profileNameInput').value = profile && profile.name ? profile.name : '';
      document.getElementById('profileNicknameInput').value = profile && profile.nickname ? profile.nickname : '';
      document.getElementById('profileBioInput').value = profile && profile.bio ? profile.bio : '';
      document.getElementById('profileGithubInput').value = profile && profile.github ? profile.github : '';
      document.getElementById('cropContainer').style.display = 'none';
      document.getElementById('editProfileModal').style.display = 'flex';
    }

    function closeProfileModal() {
      document.getElementById('editProfileModal').style.display = 'none';
    }

    function saveProfile() {
      const avatarEl = document.getElementById('avatarPreview').querySelector('img');
      // Apply crop if available
      let avatarSrc = null;
      if (avatarEl && originalImage) {
        avatarSrc = applyCrop();
      } else if (avatarEl) {
        avatarSrc = avatarEl.src;
      }
      const profile = {
        avatar: avatarSrc,
        name: document.getElementById('profileNameInput').value,
        nickname: document.getElementById('profileNicknameInput').value,
        bio: document.getElementById('profileBioInput').value,
        github: document.getElementById('profileGithubInput').value
      };
      localStorage.setItem(PROFILE_KEY, JSON.stringify(profile));
      loadProfile();
      // Reset crop state
      originalImage = null;
    }

    function handleAvatarUpload(e) {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function(evt) {
        const img = new Image();
        img.onload = function() {
          originalImage = img;
          const canvas = document.getElementById('cropCanvas');
          const maxSize = 200;
          const scale = Math.min(maxSize / img.width, maxSize / img.height);
          canvas.width = img.width * scale;
          canvas.height = img.height * scale;
          cropCanvas = canvas;
          cropContext = canvas.getContext('2d');
          cropContext.drawImage(img, 0, 0, canvas.width, canvas.height);
          document.getElementById('cropContainer').style.display = 'block';
          document.getElementById('avatarPreview').innerHTML = '<img src="' + evt.target.result + '" style="width:100%;height:100%;border-radius:50%;object-fit:cover;">';
          initCrop(img, canvas);
        };
        img.src = evt.target.result;
      };
      reader.readAsDataURL(file);
    }

    function initCrop(img, canvas) {
      const container = canvas.parentElement;
      container.style.position = 'relative';

      // Create overlay for selection
      let overlay = container.querySelector('.crop-overlay');
      if (!overlay) {
        overlay = document.createElement('div');
        overlay.className = 'crop-overlay';
        container.appendChild(overlay);
      }
      overlay.style.cssText = 'position:absolute;left:0;top:0;right:0;bottom:0;cursor:move;';

      const rect = canvas.getBoundingClientRect();
      const size = Math.min(rect.width, rect.height);
      imgSelection = {
        x: (rect.width - size) / 2,
        y: (rect.height - size) / 2,
        w: size,
        h: size
      };

      let startX = 0, startY = 0;

      function startDrag(e) {
        e.preventDefault();
        isDragging = true;
        const pos = e.touches ? e.touches[0] : e;
        startX = pos.clientX - rect.left;
        startY = pos.clientY - rect.top;
      }

      function doDrag(e) {
        if (!isDragging) return;
        e.preventDefault();
        const pos = e.touches ? e.touches[0] : e;
        const x = pos.clientX - rect.left;
        const y = pos.clientY - rect.top;
        const dx = x - startX;
        const dy = y - startY;
        imgSelection.x = Math.max(0, Math.min(imgSelection.x + dx, rect.width - imgSelection.w));
        imgSelection.y = Math.max(0, Math.min(imgSelection.y + dy, rect.height - imgSelection.h));
        startX = x;
        startY = y;
        drawSelection();
      }

      function endDrag() { isDragging = false; }

      overlay.onmousedown = startDrag;
      overlay.onmousemove = doDrag;
      overlay.onmouseup = endDrag;
      overlay.ontouchstart = startDrag;
      overlay.ontouchmove = doDrag;
      overlay.ontouchend = endDrag;

      drawSelection();
    }

    function drawSelection() {
      if (!cropCanvas || !cropContext || !originalImage) return;
      // Redraw full image
      cropContext.drawImage(originalImage, 0, 0, cropCanvas.width, cropCanvas.height);
      // Draw darkened overlay outside selection
      cropContext.fillStyle = 'rgba(0,0,0,0.5)';
      cropContext.fillRect(0, 0, cropCanvas.width, imgSelection.y);
      cropContext.fillRect(0, imgSelection.y, imgSelection.x, imgSelection.h);
      cropContext.fillRect(imgSelection.x + imgSelection.w, imgSelection.y, cropCanvas.width - imgSelection.x - imgSelection.w, imgSelection.h);
      cropContext.fillRect(0, imgSelection.y + imgSelection.h, cropCanvas.width, cropCanvas.height - imgSelection.y - imgSelection.h);
      // Draw selection border
      cropContext.strokeStyle = '#FFB7C5';
      cropContext.lineWidth = 2;
      cropContext.strokeRect(imgSelection.x, imgSelection.y, imgSelection.w, imgSelection.h);
    }

    function applyCrop() {
      if (!originalImage || !cropCanvas) return null;
      const cropCanvas2 = document.createElement('canvas');
      const size = Math.min(imgSelection.w, imgSelection.h);
      cropCanvas2.width = size;
      cropCanvas2.height = size;
      const ctx = cropCanvas2.getContext('2d');
      ctx.drawImage(originalImage,
        imgSelection.x * (originalImage.width / cropCanvas.width),
        imgSelection.y * (originalImage.height / cropCanvas.height),
        size * (originalImage.width / cropCanvas.width),
        size * (originalImage.height / cropCanvas.height),
        0, 0, size, size);
      return cropCanvas2.toDataURL('image/png');
    }
  </script>
