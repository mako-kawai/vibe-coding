<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>课程作业 - mako的学习记录</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- 樱花飘落容器 -->
  <div class="sakura-container" id="sakuraContainer"></div>

  <!-- 导航栏 -->
  <nav class="navbar">
    <div class="nav-content">
      <a href="index.html" class="nav-logo">🌸 mako's Learning</a>
      <ul class="nav-links">
        <li><a href="index.html">首页</a></li>
        <li><a href="notes.html">课程笔记</a></li>
        <li><a href="homework.html" class="active">课程作业</a></li>
        <li><a href="schedule.html">日程</a></li>
        <li><a href="help.html">帮助</a></li>
      </ul>
    </div>
  </nav>

  <!-- 主要内容 -->
  <main class="main-content">
    <section class="section homework-section">
      <div class="container">
        <h2 class="section-title fade-in">📋 课程作业</h2>

        <!-- 课程选择标签 -->
        <div class="homework-course-tabs fade-in" id="homeworkTabs">
          <!-- 标签将由 JavaScript 渲染 -->
        </div>

        <!-- 截止日期筛选 -->
        <div class="homework-status-filters fade-in" id="homeworkStatusFilters">
          <button type="button" class="filter-btn active" data-status="all" onclick="filterHomeworkByStatus('all')">全部</button>
          <button type="button" class="filter-btn" data-status="overdue" onclick="filterHomeworkByStatus('overdue')">⚠️ 已过期</button>
          <button type="button" class="filter-btn" data-status="today" onclick="filterHomeworkByStatus('today')">📅 今天截止</button>
          <button type="button" class="filter-btn" data-status="upcoming" onclick="filterHomeworkByStatus('upcoming')">⏰ 即将截止</button>
          <button type="button" class="filter-btn" data-status="pending" onclick="filterHomeworkByStatus('pending')">📋 待完成</button>
          <button type="button" class="filter-btn" data-status="completed" onclick="filterHomeworkByStatus('completed')">✅ 已完成</button>
        </div>

        <!-- 作业标签筛选 -->
        <div class="homework-tag-filters fade-in" id="homeworkTagFilters">
          <button type="button" class="filter-btn" onclick="openHomeworkTagsModal()">🏷️ 按标签筛选</button>
        </div>

        <!-- 作业统计 -->
        <div class="homework-stats fade-in" id="homeworkStats">
          <span id="homeworkCountText">共 0 项作业</span>
        </div>

        <!-- 作业列表 -->
        <div id="homeworkList" class="homework-list">
          <!-- 作业卡片将由 JavaScript 渲染 -->
        </div>

        <!-- 添加作业按钮 -->
        <div class="homework-add-section fade-in">
          <button type="button" id="addHomeworkBtn" class="course-btn">➕ 添加作业</button>
        </div>
      </div>
    </section>
  </main>

  <!-- 添加作业模态框 -->
  <div id="addHomeworkModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3>添加作业</h3>
        <button type="button" class="modal-close" onclick="closeHomeworkModal()">&times;</button>
      </div>
      <form id="addHomeworkForm" class="modal-form">
        <div class="form-group">
          <label for="homeworkTitle">作业标题 *</label>
          <input type="text" id="homeworkTitle" required placeholder="例如：第一章练习题">
        </div>
        <div class="form-group">
          <label for="homeworkCourse">所属课程 *</label>
          <select id="homeworkCourse" required>
            <!-- 选项将由 JavaScript 渲染 -->
          </select>
        </div>
        <div class="form-group">
          <label for="homeworkDesc">作业描述</label>
          <textarea id="homeworkDesc" rows="3" placeholder="作业的具体要求..."></textarea>
        </div>
        <div class="form-group">
          <label for="homeworkDueDate">截止日期</label>
          <input type="date" id="homeworkDueDate">
        </div>
        <div class="form-actions">
          <button type="button" class="course-btn-secondary" onclick="closeHomeworkModal()">取消</button>
          <button type="submit" class="course-btn">添加</button>
        </div>
      </form>
    </div>
  </div>

  <!-- 作业标签筛选模态框 -->
  <div id="homeworkTagModal" class="modal">
    <div class="modal-content modal-content-sm">
      <div class="modal-header">
        <h3>🏷️ 按标签筛选作业</h3>
        <button type="button" class="modal-close" onclick="closeHomeworkTagsModal()">&times;</button>
      </div>
      <div class="modal-form">
        <p style="margin-bottom: 15px; color: var(--text-light);">选择标签来筛选作业（可多选）</p>
        <div id="homeworkTagList" style="margin-bottom: 15px;"></div>
        <div style="display: flex; gap: 10px; justify-content: flex-end;">
          <button type="button" class="course-btn-secondary" onclick="clearHomeworkTagFilters()">清除筛选</button>
          <button type="button" class="course-btn" onclick="closeHomeworkTagsModal()">确定</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 作业标签管理模态框 -->
  <div id="homeworkManageTagsModal" class="modal">
    <div class="modal-content modal-content-sm">
      <div class="modal-header">
        <h3>🏷️ 管理作业标签</h3>
        <button type="button" class="modal-close" onclick="closeHomeworkManageTagsModal()">&times;</button>
      </div>
      <div class="modal-form">
        <p id="homeworkTagFileName" style="margin-bottom: 15px; color: var(--text-light);"></p>
        <div id="homeworkTagsListForFile" style="margin-bottom: 15px;"></div>
        <div class="form-actions">
          <button type="button" class="course-btn-secondary" onclick="closeHomeworkManageTagsModal()">关闭</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 页脚 -->
  <footer class="footer">
    <div class="container">
      <p>mako's Learning · 2026</p>
      <p class="footer-note">在樱花之森下漫步</p>
    </div>
  </footer>

  <script src="courses.js"></script>
  <script src="script.js"></script>
  <script>
    // ===== 作业管理 =====
    const HOMEWORK_KEY = 'course_homework';
    let currentHomeworkCourse = '';
    let currentHomeworkStatus = 'all';

    // 加载作业
    function loadHomework() {
      return JSON.parse(localStorage.getItem(HOMEWORK_KEY) || '[]');
    }

    // 保存作业
    function saveHomework(homework) {
      localStorage.setItem(HOMEWORK_KEY, JSON.stringify(homework));
    }

    // 按状态筛选作业
    function filterHomeworkByStatus(status) {
      currentHomeworkStatus = status;
      document.querySelectorAll('.homework-status-filters .filter-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.status === status);
      });
      renderHomework();
    }

    // 获取作业状态
    function getHomeworkStatus(hw) {
      if (hw.completed) return 'completed';
      if (!hw.dueDate) return 'pending';
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      const due = new Date(hw.dueDate);
      due.setHours(0, 0, 0, 0);
      const diff = due.getTime() - today.getTime();
      const days = Math.ceil(diff / (1000 * 60 * 60 * 24));
      if (days < 0) return 'overdue';
      if (days === 0) return 'today';
      if (days <= 3) return 'upcoming';
      return 'pending';
    }

    // 获取剩余天数文字
    function getDueCountdown(dueDate) {
      if (!dueDate) return '';
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      const due = new Date(dueDate);
      due.setHours(0, 0, 0, 0);
      const diff = due.getTime() - today.getTime();
      const days = Math.ceil(diff / (1000 * 60 * 60 * 24));
      if (days < 0) return `已过期 ${Math.abs(days)} 天`;
      if (days === 0) return '今天截止！';
      if (days === 1) return '明天截止';
      return `${days} 天后截止`;
    }

    // 添加作业
    function addHomework(title, courseId, description, dueDate) {
      const homework = loadHomework();
      const newHomework = {
        id: 'hw_' + Date.now(),
        title,
        courseId,
        description: description || '',
        dueDate: dueDate || null,
        completed: false,
        tagIds: [],
        createdAt: new Date().toISOString()
      };
      homework.push(newHomework);
      saveHomework(homework);

      // 同时添加到待办事项
      if (dueDate) {
        const todos = JSON.parse(localStorage.getItem('user_todos') || '[]');
        todos.push({
          id: 'todo_' + Date.now(),
          text: '📋 ' + title,
          dueDate,
          courseId,
          completed: false,
          homeworkId: newHomework.id,
          createdAt: new Date().toISOString()
        });
        localStorage.setItem('user_todos', JSON.stringify(todos));
      }

      return newHomework;
    }

    // 切换作业完成状态
    function toggleHomeworkComplete(homeworkId) {
      const homework = loadHomework();
      const item = homework.find(h => h.id === homeworkId);
      if (item) {
        item.completed = !item.completed;
        saveHomework(homework);

        // 同步更新待办事项
        const todos = JSON.parse(localStorage.getItem('user_todos') || '[]');
        const todo = todos.find(t => t.homeworkId === homeworkId);
        if (todo) {
          todo.completed = item.completed;
          localStorage.setItem('user_todos', JSON.stringify(todos));
        }
      }
    }

    // 删除作业
    function deleteHomework(homeworkId) {
      if (!confirm('确定要删除这个作业吗？')) return;
      const homework = loadHomework();
      const filtered = homework.filter(h => h.id !== homeworkId);
      saveHomework(filtered);

      // 同时删除关联的待办事项
      const todos = JSON.parse(localStorage.getItem('user_todos') || '[]');
      const filteredTodos = todos.filter(t => t.homeworkId !== homeworkId);
      localStorage.setItem('user_todos', JSON.stringify(filteredTodos));

      renderHomework();
    }

    // 渲染课程标签
    function renderHomeworkTabs() {
      const tabsContainer = document.getElementById('homeworkTabs');
      const courses = getCoursesArray();

      tabsContainer.innerHTML = courses.map(course => `
        <button type="button" class="course-tab ${course.id === currentHomeworkCourse ? 'active' : ''}"
                data-course="${course.id}" onclick="switchHomeworkTab('${course.id}')">
          ${course.icon} ${course.name}
        </button>
      `).join('');
    }

    // 切换作业标签
    function switchHomeworkTab(courseId) {
      currentHomeworkCourse = courseId;
      renderHomeworkTabs();
      renderHomework();
    }

    // 渲染作业列表
    function renderHomework() {
      const listContainer = document.getElementById('homeworkList');
      const homework = loadHomework();
      let courseHomework = homework.filter(h => h.courseId === currentHomeworkCourse);

      // 按状态筛选
      if (currentHomeworkStatus !== 'all') {
        courseHomework = courseHomework.filter(hw => {
          const status = getHomeworkStatus(hw);
          return status === currentHomeworkStatus;
        });
      }

      // 更新统计
      const allCourseHomework = homework.filter(h => h.courseId === currentHomeworkCourse);
      const pendingCount = allCourseHomework.filter(hw => !hw.completed).length;
      const completedCount = allCourseHomework.filter(hw => hw.completed).length;
      document.getElementById('homeworkCountText').textContent =
        `共 ${allCourseHomework.length} 项作业（${pendingCount} 待完成，${completedCount} 已完成）`;

      if (courseHomework.length === 0) {
        listContainer.innerHTML = `
          <div class="homework-empty">
            <span class="empty-icon">${getCourseById(currentHomeworkCourse)?.icon || '📚'}</span>
            <p class="empty-title">暂无作业</p>
            <p>点击下方「➕ 添加作业」按钮添加新作业</p>
          </div>
        `;
        return;
      }

      // 按完成状态和截止日期排序
      courseHomework.sort((a, b) => {
        if (a.completed !== b.completed) return a.completed ? 1 : -1;
        if (a.dueDate && b.dueDate) return new Date(a.dueDate) - new Date(b.dueDate);
        return 0;
      });

      listContainer.innerHTML = courseHomework.map(hw => {
        const hwStatus = getHomeworkStatus(hw);
        const statusClass = hwStatus;
        const statusText = hw.completed ? '✓ 已完成' :
                         hwStatus === 'overdue' ? '⚠️ 已过期' :
                         hwStatus === 'today' ? '📅 今天截止' :
                         hwStatus === 'upcoming' ? '⏰ 即将截止' : '📋 待完成';
        const countdown = getDueCountdown(hw.dueDate);

        return `
          <div class="homework-card ${hw.completed ? 'completed' : ''}">
            <div class="homework-header">
              <label class="homework-checkbox">
                <input type="checkbox" ${hw.completed ? 'checked' : ''}
                       onchange="handleToggleHomework('${hw.id}')">
                <span class="checkmark"></span>
              </label>
              <span class="homework-status ${statusClass}">${statusText}</span>
              ${hw.dueDate ? `<span class="homework-date">${hw.dueDate}</span>` : ''}
            </div>
            <h3 class="homework-title">${hw.title}</h3>
            ${hw.description ? `<p class="homework-desc">${hw.description}</p>` : ''}
            ${countdown ? `<div class="homework-countdown">${countdown}</div>` : ''}
            <div class="homework-actions">
              <button type="button" class="homework-delete-btn" onclick="handleDeleteHomework('${hw.id}')">🗑️ 删除</button>
            </div>
          </div>
        `;
      }).join('');
    }

    // 获取日期状态
    function getDueDateStatus(dueDate) {
      if (!dueDate) return 'none';
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      const due = new Date(dueDate);
      due.setHours(0, 0, 0, 0);
      const diff = due.getTime() - today.getTime();
      const days = Math.ceil(diff / (1000 * 60 * 60 * 24));
      if (days < 0) return 'overdue';
      if (days === 0) return 'today';
      if (days <= 3) return 'soon';
      return 'future';
    }

    // 处理切换作业完成状态
    function handleToggleHomework(homeworkId) {
      toggleHomeworkComplete(homeworkId);
      renderHomework();
    }

    // 处理删除作业
    function handleDeleteHomework(homeworkId) {
      deleteHomework(homeworkId);
    }

    // 关闭模态框
    function closeHomeworkModal() {
      document.getElementById('addHomeworkModal').style.display = 'none';
    }

    // ===== 作业标签系统 =====
    const HOMEWORK_TAGS_KEY = 'homework_tags';
    let homeworkTagFilters = []; // 当前选中的标签筛选
    let currentHomeworkForTags = null;

    function loadHomeworkTags() {
      return JSON.parse(localStorage.getItem(HOMEWORK_TAGS_KEY) || '[]');
    }

    function saveHomeworkTags(tags) {
      localStorage.setItem(HOMEWORK_TAGS_KEY, JSON.stringify(tags));
    }

    function openHomeworkTagsModal() {
      const tags = loadHomeworkTags();
      const homework = loadHomework();
      const currentCourseHomework = homework.filter(h => h.courseId === currentHomeworkCourse);
      const usedTagIds = [...new Set(currentCourseHomework.flatMap(h => h.tagIds || []))];
      const usedTags = tags.filter(t => usedTagIds.includes(t.id));

      const listEl = document.getElementById('homeworkTagList');
      if (usedTags.length === 0) {
        listEl.innerHTML = '<p class="text-muted">当前课程作业暂无标签</p>';
      } else {
        listEl.innerHTML = usedTags.map(t => `
          <label class="tag-toggle-item" style="display: flex; align-items: center; gap: 8px; padding: 8px; cursor: pointer;">
            <input type="checkbox" value="${t.id}" ${homeworkTagFilters.includes(t.id) ? 'checked' : ''}
                   onchange="toggleHomeworkTagFilter('${t.id}')">
            <span style="background-color: ${t.color}20; border: 1px solid ${t.color}; padding: 2px 8px; border-radius: 4px;">${t.name}</span>
          </label>
        `).join('');
      }

      document.getElementById('homeworkTagModal').style.display = 'flex';
    }

    function closeHomeworkTagsModal() {
      document.getElementById('homeworkTagModal').style.display = 'none';
      renderHomework();
    }

    function toggleHomeworkTagFilter(tagId) {
      const index = homeworkTagFilters.indexOf(tagId);
      if (index === -1) {
        homeworkTagFilters.push(tagId);
      } else {
        homeworkTagFilters.splice(index, 1);
      }
      renderHomework();
    }

    function clearHomeworkTagFilters() {
      homeworkTagFilters = [];
      renderHomework();
      closeHomeworkTagsModal();
    }

    function openHomeworkManageTagsModal(homeworkId) {
      currentHomeworkForTags = homeworkId;
      const homework = loadHomework();
      const hw = homework.find(h => h.id === homeworkId);
      if (!hw) return;

      document.getElementById('homeworkTagFileName').textContent = '作业：' + hw.title;

      const tags = loadHomeworkTags();
      const hwTagIds = hw.tagIds || [];

      const listEl = document.getElementById('homeworkTagsListForFile');
      if (tags.length === 0) {
        listEl.innerHTML = '<p class="text-muted">暂无作业标签，请先在筛选中添加标签</p>';
      } else {
        listEl.innerHTML = tags.map(t => `
          <label class="tag-toggle-item" style="display: flex; align-items: center; gap: 8px; padding: 8px; cursor: pointer;">
            <input type="checkbox" value="${t.id}" ${hwTagIds.includes(t.id) ? 'checked' : ''}
                   onchange="toggleHomeworkFileTag('${homeworkId}', '${t.id}')">
            <span style="background-color: ${t.color}20; border: 1px solid ${t.color}; padding: 2px 8px; border-radius: 4px;">${t.name}</span>
          </label>
        `).join('');
      }

      document.getElementById('homeworkManageTagsModal').style.display = 'flex';
    }

    function closeHomeworkManageTagsModal() {
      document.getElementById('homeworkManageTagsModal').style.display = 'none';
      currentHomeworkForTags = null;
    }

    function toggleHomeworkFileTag(homeworkId, tagId) {
      const homework = loadHomework();
      const hw = homework.find(h => h.id === homeworkId);
      if (!hw) return;

      if (!hw.tagIds) hw.tagIds = [];

      const index = hw.tagIds.indexOf(tagId);
      if (index === -1) {
        hw.tagIds.push(tagId);
      } else {
        hw.tagIds.splice(index, 1);
      }

      saveHomework(homework);
      renderHomework();
    }

    // 修改 renderHomework 函数以支持标签筛选
    const originalRenderHomework = renderHomework;
    renderHomework = function() {
      const listContainer = document.getElementById('homeworkList');
      const homework = loadHomework();
      let courseHomework = homework.filter(h => h.courseId === currentHomeworkCourse);

      // 按状态筛选
      if (currentHomeworkStatus !== 'all') {
        courseHomework = courseHomework.filter(hw => {
          const status = getHomeworkStatus(hw);
          return status === currentHomeworkStatus;
        });
      }

      // 按标签筛选
      if (homeworkTagFilters.length > 0) {
        courseHomework = courseHomework.filter(hw => {
          const hwTagIds = hw.tagIds || [];
          return homeworkTagFilters.some(tagId => hwTagIds.includes(tagId));
        });
      }

      // 更新统计
      const allCourseHomework = homework.filter(h => h.courseId === currentHomeworkCourse);
      const pendingCount = allCourseHomework.filter(hw => !hw.completed).length;
      const completedCount = allCourseHomework.filter(hw => hw.completed).length;
      document.getElementById('homeworkCountText').textContent =
        `共 ${allCourseHomework.length} 项作业（${pendingCount} 待完成，${completedCount} 已完成）`;

      if (courseHomework.length === 0) {
        listContainer.innerHTML = `
          <div class="homework-empty">
            <span class="empty-icon">${getCourseById(currentHomeworkCourse)?.icon || '📚'}</span>
            <p class="empty-title">暂无作业</p>
            <p>点击下方「➕ 添加作业」按钮添加新作业</p>
          </div>
        `;
        return;
      }

      // 按完成状态和截止日期排序
      courseHomework.sort((a, b) => {
        if (a.completed !== b.completed) return a.completed ? 1 : -1;
        if (a.dueDate && b.dueDate) return new Date(a.dueDate) - new Date(b.dueDate);
        return 0;
      });

      listContainer.innerHTML = courseHomework.map(hw => {
        const hwStatus = getHomeworkStatus(hw);
        const statusClass = hwStatus;
        const statusText = hw.completed ? '✓ 已完成' :
                         hwStatus === 'overdue' ? '⚠️ 已过期' :
                         hwStatus === 'today' ? '📅 今天截止' :
                         hwStatus === 'upcoming' ? '⏰ 即将截止' : '📋 待完成';
        const countdown = getDueCountdown(hw.dueDate);

        const tags = loadHomeworkTags();
        const hwTagIds = hw.tagIds || [];
        const hwTags = tags.filter(t => hwTagIds.includes(t.id));
        const tagsHtml = hwTags.map(t => `<span style="background-color: ${t.color}20; border: 1px solid ${t.color}; padding: 1px 6px; border-radius: 10px; font-size: 0.75rem;">${t.name}</span>`).join('');

        return `
          <div class="homework-card ${hw.completed ? 'completed' : ''}">
            <div class="homework-header">
              <label class="homework-checkbox">
                <input type="checkbox" ${hw.completed ? 'checked' : ''}
                       onchange="handleToggleHomework('${hw.id}')">
                <span class="checkmark"></span>
              </label>
              <span class="homework-status ${statusClass}">${statusText}</span>
              ${hw.dueDate ? `<span class="homework-date">${hw.dueDate}</span>` : ''}
            </div>
            <h3 class="homework-title">${hw.title}</h3>
            ${hw.description ? `<p class="homework-desc">${hw.description}</p>` : ''}
            ${tagsHtml ? `<div style="margin-top: 8px;">${tagsHtml}</div>` : ''}
            ${countdown ? `<div class="homework-countdown">${countdown}</div>` : ''}
            <div class="homework-actions">
              <button type="button" class="homework-tag-btn" onclick="openHomeworkManageTagsModal('${hw.id}')">🏷️</button>
              <button type="button" class="homework-delete-btn" onclick="handleDeleteHomework('${hw.id}')">🗑️ 删除</button>
            </div>
          </div>
        `;
      }).join('');
    };

    // 初始化作业页面
    document.addEventListener('DOMContentLoaded', function() {
      // 填充课程选择下拉框
      const courseSelect = document.getElementById('homeworkCourse');
      const courses = getCoursesArray();
      courseSelect.innerHTML = courses.map(c =>
        `<option value="${c.id}">${c.icon} ${c.name}</option>`
      ).join('');

      // 默认选择第一个课程
      if (courses.length > 0) {
        currentHomeworkCourse = courses[0].id;
      }

      // 渲染标签和作业
      renderHomeworkTabs();
      renderHomework();

      // 添加作业按钮
      document.getElementById('addHomeworkBtn').addEventListener('click', function() {
        document.getElementById('homeworkCourse').value = currentHomeworkCourse;
        document.getElementById('addHomeworkModal').style.display = 'flex';
      });

      // 表单提交
      document.getElementById('addHomeworkForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const title = document.getElementById('homeworkTitle').value;
        const courseId = document.getElementById('homeworkCourse').value;
        const description = document.getElementById('homeworkDesc').value;
        const dueDate = document.getElementById('homeworkDueDate').value;

        addHomework(title, courseId, description, dueDate);
        closeHomeworkModal();
        renderHomework();
        this.reset();
      });

      // 点击模态框外部关闭
      document.getElementById('addHomeworkModal').addEventListener('click', function(e) {
        if (e.target === this) closeHomeworkModal();
      });
    });
  </script>
</body>
</html>
