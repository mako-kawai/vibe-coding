<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>课程作业 - mako的学习记录</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- 樱花飘落容器 -->
  <div class="sakura-container" id="sakuraContainer"></div>

  <!-- 导航栏 -->
  <nav class="navbar">
    <div class="nav-content">
      <a href="index.html" class="nav-logo">🌸 mako's Learning</a>
      <ul class="nav-links">
        <li><a href="index.html">首页</a></li>
        <li><a href="notes.html">课程笔记</a></li>
        <li><a href="homework.html" class="active">课程作业</a></li>
        <li><a href="schedule.html">日程</a></li>
        <li><a href="help.html">帮助</a></li>
      </ul>
    </div>
  </nav>

  <!-- 主要内容 -->
  <main class="main-content">
    <section class="section homework-section">
      <div class="container">
        <h2 class="section-title fade-in">📋 课程作业</h2>

        <!-- 课程选择标签 -->
        <div class="homework-course-tabs fade-in" id="homeworkTabs">
          <!-- 标签将由 JavaScript 渲染 -->
        </div>

        <!-- 作业列表 -->
        <div id="homeworkList" class="homework-list">
          <!-- 作业卡片将由 JavaScript 渲染 -->
        </div>

        <!-- 添加作业按钮 -->
        <div class="homework-add-section fade-in">
          <button type="button" id="addHomeworkBtn" class="course-btn">➕ 添加作业</button>
        </div>
      </div>
    </section>
  </main>

  <!-- 添加作业模态框 -->
  <div id="addHomeworkModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3>添加作业</h3>
        <button type="button" class="modal-close" onclick="closeHomeworkModal()">&times;</button>
      </div>
      <form id="addHomeworkForm" class="modal-form">
        <div class="form-group">
          <label for="homeworkTitle">作业标题 *</label>
          <input type="text" id="homeworkTitle" required placeholder="例如：第一章练习题">
        </div>
        <div class="form-group">
          <label for="homeworkCourse">所属课程 *</label>
          <select id="homeworkCourse" required>
            <!-- 选项将由 JavaScript 渲染 -->
          </select>
        </div>
        <div class="form-group">
          <label for="homeworkDesc">作业描述</label>
          <textarea id="homeworkDesc" rows="3" placeholder="作业的具体要求..."></textarea>
        </div>
        <div class="form-group">
          <label for="homeworkDueDate">截止日期</label>
          <input type="date" id="homeworkDueDate">
        </div>
        <div class="form-actions">
          <button type="button" class="course-btn-secondary" onclick="closeHomeworkModal()">取消</button>
          <button type="submit" class="course-btn">添加</button>
        </div>
      </form>
    </div>
  </div>

  <!-- 页脚 -->
  <footer class="footer">
    <div class="container">
      <p>mako's Learning · 2026</p>
      <p class="footer-note">漫步于樱花之森下</p>
    </div>
  </footer>

  <script src="courses.js"></script>
  <script src="script.js"></script>
  <script>
    // ===== 作业管理 =====
    const HOMEWORK_KEY = 'course_homework';
    let currentHomeworkCourse = '';

    // 加载作业
    function loadHomework() {
      return JSON.parse(localStorage.getItem(HOMEWORK_KEY) || '[]');
    }

    // 保存作业
    function saveHomework(homework) {
      localStorage.setItem(HOMEWORK_KEY, JSON.stringify(homework));
    }

    // 添加作业
    function addHomework(title, courseId, description, dueDate) {
      const homework = loadHomework();
      const newHomework = {
        id: 'hw_' + Date.now(),
        title,
        courseId,
        description: description || '',
        dueDate: dueDate || null,
        completed: false,
        createdAt: new Date().toISOString()
      };
      homework.push(newHomework);
      saveHomework(homework);

      // 同时添加到待办事项
      if (dueDate) {
        const todos = JSON.parse(localStorage.getItem('user_todos') || '[]');
        todos.push({
          id: 'todo_' + Date.now(),
          text: '📋 ' + title,
          dueDate,
          courseId,
          completed: false,
          homeworkId: newHomework.id,
          createdAt: new Date().toISOString()
        });
        localStorage.setItem('user_todos', JSON.stringify(todos));
      }

      return newHomework;
    }

    // 切换作业完成状态
    function toggleHomeworkComplete(homeworkId) {
      const homework = loadHomework();
      const item = homework.find(h => h.id === homeworkId);
      if (item) {
        item.completed = !item.completed;
        saveHomework(homework);

        // 同步更新待办事项
        const todos = JSON.parse(localStorage.getItem('user_todos') || '[]');
        const todo = todos.find(t => t.homeworkId === homeworkId);
        if (todo) {
          todo.completed = item.completed;
          localStorage.setItem('user_todos', JSON.stringify(todos));
        }
      }
    }

    // 删除作业
    function deleteHomework(homeworkId) {
      if (!confirm('确定要删除这个作业吗？')) return;
      const homework = loadHomework();
      const filtered = homework.filter(h => h.id !== homeworkId);
      saveHomework(filtered);

      // 同时删除关联的待办事项
      const todos = JSON.parse(localStorage.getItem('user_todos') || '[]');
      const filteredTodos = todos.filter(t => t.homeworkId !== homeworkId);
      localStorage.setItem('user_todos', JSON.stringify(filteredTodos));

      renderHomework();
    }

    // 渲染课程标签
    function renderHomeworkTabs() {
      const tabsContainer = document.getElementById('homeworkTabs');
      const courses = getCoursesArray();

      tabsContainer.innerHTML = courses.map(course => `
        <button type="button" class="course-tab ${course.id === currentHomeworkCourse ? 'active' : ''}"
                data-course="${course.id}" onclick="switchHomeworkTab('${course.id}')">
          ${course.icon} ${course.name}
        </button>
      `).join('');
    }

    // 切换作业标签
    function switchHomeworkTab(courseId) {
      currentHomeworkCourse = courseId;
      renderHomeworkTabs();
      renderHomework();
    }

    // 渲染作业列表
    function renderHomework() {
      const listContainer = document.getElementById('homeworkList');
      const homework = loadHomework();
      const courseHomework = homework.filter(h => h.courseId === currentHomeworkCourse);

      if (courseHomework.length === 0) {
        listContainer.innerHTML = `
          <div class="homework-empty">
            <span class="empty-icon">${getCourseById(currentHomeworkCourse)?.icon || '📚'}</span>
            <p>暂无作业，点击下方按钮添加</p>
          </div>
        `;
        return;
      }

      // 按完成状态和截止日期排序
      courseHomework.sort((a, b) => {
        if (a.completed !== b.completed) return a.completed ? 1 : -1;
        if (a.dueDate && b.dueDate) return new Date(a.dueDate) - new Date(b.dueDate);
        return 0;
      });

      listContainer.innerHTML = courseHomework.map(hw => {
        const dueStatus = getDueDateStatus(hw.dueDate);
        const statusClass = hw.completed ? 'completed' :
                          dueStatus === 'overdue' ? 'overdue' :
                          dueStatus === 'today' ? 'today' : 'pending';
        const statusText = hw.completed ? '✓ 已完成' :
                         dueStatus === 'overdue' ? '⚠️ 已过期' :
                         dueStatus === 'today' ? '📅 今天截止' :
                         dueStatus === 'soon' ? '⏰ 即将截止' : '📋 待完成';

        return `
          <div class="homework-card ${hw.completed ? 'completed' : ''}">
            <div class="homework-header">
              <label class="homework-checkbox">
                <input type="checkbox" ${hw.completed ? 'checked' : ''}
                       onchange="handleToggleHomework('${hw.id}')">
                <span class="checkmark"></span>
              </label>
              <span class="homework-status ${statusClass}">${statusText}</span>
              ${hw.dueDate ? `<span class="homework-date">${hw.dueDate}</span>` : ''}
            </div>
            <h3 class="homework-title">${hw.title}</h3>
            ${hw.description ? `<p class="homework-desc">${hw.description}</p>` : ''}
            <div class="homework-actions">
              <button type="button" class="homework-delete-btn" onclick="handleDeleteHomework('${hw.id}')">🗑️ 删除</button>
            </div>
          </div>
        `;
      }).join('');
    }

    // 获取日期状态
    function getDueDateStatus(dueDate) {
      if (!dueDate) return 'none';
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      const due = new Date(dueDate);
      due.setHours(0, 0, 0, 0);
      const diff = due.getTime() - today.getTime();
      const days = Math.ceil(diff / (1000 * 60 * 60 * 24));
      if (days < 0) return 'overdue';
      if (days === 0) return 'today';
      if (days <= 3) return 'soon';
      return 'future';
    }

    // 处理切换作业完成状态
    function handleToggleHomework(homeworkId) {
      toggleHomeworkComplete(homeworkId);
      renderHomework();
    }

    // 处理删除作业
    function handleDeleteHomework(homeworkId) {
      deleteHomework(homeworkId);
    }

    // 关闭模态框
    function closeHomeworkModal() {
      document.getElementById('addHomeworkModal').style.display = 'none';
    }

    // 初始化作业页面
    document.addEventListener('DOMContentLoaded', function() {
      // 填充课程选择下拉框
      const courseSelect = document.getElementById('homeworkCourse');
      const courses = getCoursesArray();
      courseSelect.innerHTML = courses.map(c =>
        `<option value="${c.id}">${c.icon} ${c.name}</option>`
      ).join('');

      // 默认选择第一个课程
      if (courses.length > 0) {
        currentHomeworkCourse = courses[0].id;
      }

      // 渲染标签和作业
      renderHomeworkTabs();
      renderHomework();

      // 添加作业按钮
      document.getElementById('addHomeworkBtn').addEventListener('click', function() {
        document.getElementById('homeworkCourse').value = currentHomeworkCourse;
        document.getElementById('addHomeworkModal').style.display = 'flex';
      });

      // 表单提交
      document.getElementById('addHomeworkForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const title = document.getElementById('homeworkTitle').value;
        const courseId = document.getElementById('homeworkCourse').value;
        const description = document.getElementById('homeworkDesc').value;
        const dueDate = document.getElementById('homeworkDueDate').value;

        addHomework(title, courseId, description, dueDate);
        closeHomeworkModal();
        renderHomework();
        this.reset();
      });

      // 点击模态框外部关闭
      document.getElementById('addHomeworkModal').addEventListener('click', function(e) {
        if (e.target === this) closeHomeworkModal();
      });
    });
  </script>
</body>
</html>
