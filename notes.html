<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>课程笔记 - mako的学习记录</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
  <!-- 樱花飘落容器 -->
  <div class="sakura-container" id="sakuraContainer"></div>

  <!-- 导航栏 -->
  <nav class="navbar">
    <div class="nav-content">
      <a href="index.html" class="nav-logo">🌸 mako's Learning</a>
      <ul class="nav-links">
        <li><a href="index.html">首页</a></li>
        <li><a href="notes.html" class="active">课程笔记</a></li>
        <li><a href="homework.html">课程作业</a></li>
        <li><a href="schedule.html">日程</a></li>
        <li><a href="help.html">帮助</a></li>
      </ul>
    </div>
  </nav>

  <!-- 主要内容 -->
  <main class="main-content">
    <section class="section notes-section">
      <div class="container">
        <h2 class="section-title fade-in">📝 课程笔记</h2>

        <div class="notes-header fade-in">
          <div class="notes-course-selector">
            <label for="courseSelect">选择课程：</label>
            <select id="courseSelect" class="course-select">
              <!-- 课程选项将由 JavaScript 动态填充 -->
            </select>
          </div>
          <div class="notes-actions">
            <button type="button" id="uploadFileBtn" class="notes-btn">📤 上传文件</button>
            <button type="button" id="saveNotes" class="notes-btn">💾 保存</button>
            <button type="button" id="clearNotes" class="notes-btn notes-btn-clear">🗑️ 清空</button>
          </div>
        </div>
        <input type="file" id="fileInput" accept=".md,.txt,.pdf" class="file-input-hidden" title="选择文件上传">

        <!-- 笔记标签 -->
        <div class="notes-tags-section fade-in">
          <div class="tags-header">
            <span class="tags-label">🏷️ 笔记标签</span>
            <button type="button" class="tags-add-btn" onclick="openAddTagModal()">➕ 添加标签</button>
          </div>
          <div class="tags-list" id="tagsList">
            <!-- 标签将由 JavaScript 渲染 -->
          </div>
        </div>

        <div class="notes-tabs fade-in">
          <button type="button" class="notes-tab active" data-tab="edit">✏️ 编辑</button>
          <button type="button" class="notes-tab" data-tab="preview">👁️ 预览</button>
        </div>

        <div class="notes-container fade-in">
          <div id="notesEditor" class="notes-editor">
            <textarea
              id="notesTextarea"
              class="notes-textarea"
              placeholder="在这里用 Markdown 格式记录学习笔记...

例如：
# 标题
## 二级标题

- 列表项
- 列表项

**加粗文本** 和 *斜体文本*

[链接](https://example.com)

> 引用文本

代码：`inline code`

```
代码块
```"
            ></textarea>
          </div>
          <div id="notesPreview" class="notes-preview notes-preview-hidden">
            <div class="markdown-body"></div>
          </div>
        </div>

        <div class="notes-footer">
          <span class="notes-status" id="notesStatus">选择课程后可开始记录</span>
          <span class="notes-hint">使用 Markdown 格式书写，笔记将按课程分类保存</span>
        </div>

        <!-- 已上传文件列表 -->
        <div class="uploaded-files-section fade-in">
          <div class="files-header">
            <h3 class="uploaded-files-title">📁 已上传文件</h3>
            <button type="button" id="addFolderBtn" class="notes-btn notes-btn-small">📂 新建文件夹</button>
          </div>

          <!-- 文件夹导航 -->
          <div class="folder-nav" id="folderNav">
            <button type="button" class="folder-btn active" data-folder="" onclick="filterByFolder('')">全部</button>
          </div>

          <div class="uploaded-files-list" id="uploadedFilesList">
            <!-- 文件列表将由 JavaScript 渲染 -->
          </div>
        </div>

        <!-- 新建文件夹模态框 -->
        <div id="addFolderModal" class="modal">
          <div class="modal-content modal-content-sm">
            <div class="modal-header">
              <h3>新建文件夹</h3>
              <button type="button" class="modal-close" onclick="closeAddFolderModal()">&times;</button>
            </div>
            <form id="addFolderForm" class="modal-form">
              <div class="form-group">
                <label for="folderName">文件夹名称</label>
                <input type="text" id="folderName" required placeholder="例如：第一章、复习资料">
              </div>
              <div class="form-actions">
                <button type="button" class="course-btn-secondary" onclick="closeAddFolderModal()">取消</button>
                <button type="submit" class="course-btn">创建</button>
              </div>
            </form>
          </div>
        </div>

        <!-- 移动到文件夹模态框 -->
        <div id="moveFileModal" class="modal">
          <div class="modal-content modal-content-sm">
            <div class="modal-header">
              <h3>移动到文件夹</h3>
              <button type="button" class="modal-close" onclick="closeMoveFileModal()">&times;</button>
            </div>
            <div class="modal-form">
              <div class="form-group">
                <label>选择目标文件夹</label>
                <div id="folderSelectList" class="folder-select-list">
                  <!-- 文件夹选项 -->
                </div>
              </div>
              <div class="form-actions">
                <button type="button" class="course-btn-secondary" onclick="closeMoveFileModal()">取消</button>
                <button type="button" class="course-btn" onclick="confirmMoveFile()">移动</button>
              </div>
            </div>
          </div>
        </div>

        <!-- 添加标签模态框 -->
        <div id="addTagModal" class="modal">
          <div class="modal-content modal-content-sm">
            <div class="modal-header">
              <h3>添加笔记标签</h3>
              <button type="button" class="modal-close" onclick="closeAddTagModal()">&times;</button>
            </div>
            <form id="addTagForm" class="modal-form">
              <div class="form-group">
                <label for="tagName">标签名称</label>
                <input type="text" id="tagName" required placeholder="例如：重点、复习、公式">
              </div>
              <div class="form-group">
                <label for="tagColor">标签颜色</label>
                <select id="tagColor">
                  <option value="#FFB7C5">🌸 粉色</option>
                  <option value="#98D8C8">🌿 绿色</option>
                  <option value="#FFD700">⭐ 金色</option>
                  <option value="#87CEEB">🌊 蓝色</option>
                  <option value="#DDA0DD">🍇 紫色</option>
                  <option value="#FFA07A">🦐 橙色</option>
                </select>
              </div>
              <div class="form-actions">
                <button type="button" class="course-btn-secondary" onclick="closeAddTagModal()">取消</button>
                <button type="submit" class="course-btn">添加</button>
              </div>
            </form>
          </div>
        </div>

        <!-- 文件标签管理模态框 -->
        <div id="fileTagsModal" class="modal">
          <div class="modal-content modal-content-sm">
            <div class="modal-header">
              <h3>🏷️ 管理文件标签</h3>
              <button type="button" class="modal-close" onclick="closeFileTagsModal()">&times;</button>
            </div>
            <div class="modal-form">
              <p id="fileTagsFileName" class="file-tags-filename"></p>
              <div id="fileTagsList" class="file-tags-list"></div>
              <div class="form-actions">
                <button type="button" class="course-btn-secondary" onclick="closeFileTagsModal()">关闭</button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <!-- 页脚 -->
  <footer class="footer">
    <div class="container">
      <p>mako's Learning · 2026</p>
      <p class="footer-note">在樱花之森下漫步</p>
    </div>
  </footer>

  <script src="courses.js"></script>
  <script src="script.js"></script>
  <script>
    // ===== 文件夹管理 =====
    const FILE_FOLDERS_KEY = 'file_folders';
    const NOTES_TAGS_KEY = 'notes_tags';
    const UPLOADED_FILES_KEY = 'uploaded_files_meta';
    let currentFolder = '';
    let movingFileId = null;
    let selectedTags = []; // 当前选中的标签筛选

    // 加载文件夹列表
    function loadFileFolders() {
      return JSON.parse(localStorage.getItem(FILE_FOLDERS_KEY) || '[]');
    }

    // 保存文件夹列表
    function saveFileFolders(folders) {
      localStorage.setItem(FILE_FOLDERS_KEY, JSON.stringify(folders));
    }

    // 渲染文件夹导航
    function renderFolderNav() {
      const nav = document.getElementById('folderNav');
      const folders = loadFileFolders();
      const currentCourse = document.getElementById('courseSelect').value;

      // 只显示当前课程的文件夹
      const courseFolders = folders.filter(f => f.courseId === currentCourse);

      let html = `<button type="button" class="folder-btn ${currentFolder === '' ? 'active' : ''}" data-folder="" onclick="filterByFolder('')">📂 全部</button>`;

      courseFolders.forEach(folder => {
        html += `<button type="button" class="folder-btn ${currentFolder === folder.id ? 'active' : ''}" data-folder="${folder.id}" onclick="filterByFolder('${folder.id}')">📁 ${folder.name}</button>`;
      });

      nav.innerHTML = html;
    }

    // ===== 笔记标签管理 =====
    // 加载笔记标签
    function loadNotesTags() {
      return JSON.parse(localStorage.getItem(NOTES_TAGS_KEY) || '[]');
    }

    // 保存笔记标签
    function saveNotesTags(tags) {
      localStorage.setItem(NOTES_TAGS_KEY, JSON.stringify(tags));
    }

    // 获取当前课程的标签
    function getCourseTags() {
      const tags = loadNotesTags();
      const currentCourse = document.getElementById('courseSelect').value;
      return tags.filter(t => t.courseId === currentCourse);
    }

    // 渲染标签列表
    function renderTagsList() {
      const container = document.getElementById('tagsList');
      const tags = getCourseTags();

      if (tags.length === 0) {
        container.innerHTML = '<span class="tags-empty">暂无标签，添加标签来整理笔记</span>';
        return;
      }

      container.innerHTML = tags.map(tag => {
        const isSelected = selectedTags.includes(tag.id);
        return `
        <span class="tag-item ${isSelected ? 'tag-selected' : ''}"
              style="background-color: ${tag.color}20; border-color: ${tag.color};"
              onclick="toggleTagFilter('${tag.id}')" title="点击筛选">
          <span class="tag-name">${tag.name}${isSelected ? ' ✓' : ''}</span>
          <button type="button" class="tag-delete" onclick="event.stopPropagation(); deleteTag('${tag.id}')">×</button>
        </span>
      `}).join('');

      // 如果有选中的标签，添加清除筛选按钮
      if (selectedTags.length > 0) {
        container.innerHTML += `
          <span class="tag-clear-btn" onclick="clearTagFilters()" style="cursor: pointer; color: var(--text-light); font-size: 0.85rem;">
            清除筛选
          </span>
        `;
      }
    }

    // 切换标签筛选
    function toggleTagFilter(tagId) {
      const index = selectedTags.indexOf(tagId);
      if (index === -1) {
        selectedTags.push(tagId);
      } else {
        selectedTags.splice(index, 1);
      }
      renderTagsList();
      renderUploadedFiles();
    }

    // 清除所有标签筛选
    function clearTagFilters() {
      selectedTags = [];
      renderTagsList();
      renderUploadedFiles();
    }

    // 打开添加标签模态框
    function openAddTagModal() {
      document.getElementById('tagName').value = '';
      document.getElementById('tagColor').value = '#FFB7C5';
      document.getElementById('addTagModal').style.display = 'flex';
    }

    // 关闭添加标签模态框
    function closeAddTagModal() {
      document.getElementById('addTagModal').style.display = 'none';
    }

    // 创建标签
    function createTag(name, color) {
      const tags = loadNotesTags();
      const currentCourse = document.getElementById('courseSelect').value;
      tags.push({
        id: 'tag_' + Date.now(),
        name,
        color,
        courseId: currentCourse,
        createdAt: new Date().toISOString()
      });
      saveNotesTags(tags);
      renderTagsList();
    }

    // 删除标签
    function deleteTag(tagId) {
      if (!confirm('确定要删除这个标签吗？')) return;
      const tags = loadNotesTags();
      const filtered = tags.filter(t => t.id !== tagId);
      saveNotesTags(filtered);
      renderTagsList();
    }

    // 打开文件标签管理模态框
    let currentFileForTags = null;
    function openFileTagsModal(fileId) {
      currentFileForTags = fileId;
      const files = loadUploadedFilesMeta();
      const file = files.find(f => f.id === fileId);
      if (!file) return;

      document.getElementById('fileTagsFileName').textContent = '文件：' + file.filename;

      const tags = loadNotesTags();
      const currentCourse = document.getElementById('courseSelect').value;
      const courseTags = tags.filter(t => t.courseId === currentCourse);
      const fileTagIds = file.tagIds || [];

      const listEl = document.getElementById('fileTagsList');
      if (courseTags.length === 0) {
        listEl.innerHTML = '<p class="text-muted">当前课程暂无标签，请先添加标签</p>';
      } else {
        listEl.innerHTML = courseTags.map(t => `
          <label class="tag-toggle-item" style="display: flex; align-items: center; gap: 8px; padding: 8px; cursor: pointer;">
            <input type="checkbox" value="${t.id}" ${fileTagIds.includes(t.id) ? 'checked' : ''}
                   onchange="toggleFileTag('${fileId}', '${t.id}')">
            <span class="tag-toggle-name" style="background-color: ${t.color}20; border: 1px solid ${t.color}; padding: 2px 8px; border-radius: 4px;">${t.name}</span>
          </label>
        `).join('');
      }

      document.getElementById('fileTagsModal').style.display = 'flex';
    }

    function closeFileTagsModal() {
      document.getElementById('fileTagsModal').style.display = 'none';
      currentFileForTags = null;
    }

    function toggleFileTag(fileId, tagId) {
      const files = loadUploadedFilesMeta();
      const file = files.find(f => f.id === fileId);
      if (!file) return;

      if (!file.tagIds) file.tagIds = [];

      const index = file.tagIds.indexOf(tagId);
      if (index === -1) {
        file.tagIds.push(tagId);
      } else {
        file.tagIds.splice(index, 1);
      }

      saveUploadedFilesMeta(files);
      renderUploadedFiles();
    }

    // 按文件夹筛选
    function filterByFolder(folderId) {
      currentFolder = folderId;
      renderFolderNav();
      renderUploadedFiles();
    }

    // 打开新建文件夹模态框
    function openAddFolderModal() {
      document.getElementById('folderName').value = '';
      document.getElementById('addFolderModal').style.display = 'flex';
    }

    // 关闭新建文件夹模态框
    function closeAddFolderModal() {
      document.getElementById('addFolderModal').style.display = 'none';
    }

    // 创建文件夹
    function createFolder(name) {
      const folders = loadFileFolders();
      const currentCourse = document.getElementById('courseSelect').value;
      const newFolder = {
        id: 'folder_' + Date.now(),
        name: name,
        courseId: currentCourse,
        createdAt: new Date().toISOString()
      };
      folders.push(newFolder);
      saveFileFolders(folders);
      renderFolderNav();
    }

    // 加载已上传文件列表
    function loadUploadedFilesMeta() {
      return JSON.parse(localStorage.getItem(UPLOADED_FILES_KEY) || '[]');
    }

    // 保存文件元数据
    function saveUploadedFilesMeta(files) {
      localStorage.setItem(UPLOADED_FILES_KEY, JSON.stringify(files));
    }

    // 渲染文件列表
    function renderUploadedFiles() {
      const list = document.getElementById('uploadedFilesList');
      const files = loadUploadedFilesMeta();
      const currentCourse = document.getElementById('courseSelect').value;

      let courseFiles = files.filter(f => f.courseId === currentCourse);

      // 按文件夹筛选
      if (currentFolder !== '') {
        courseFiles = courseFiles.filter(f => f.folderId === currentFolder);
      }

      // 按标签筛选
      if (selectedTags.length > 0) {
        courseFiles = courseFiles.filter(f => {
          const fileTagIds = f.tagIds || [];
          return selectedTags.some(tagId => fileTagIds.includes(tagId));
        });
      }

      if (courseFiles.length === 0) {
        list.innerHTML = '<div class="uploaded-files-empty">暂无上传文件</div>';
        return;
      }

      list.innerHTML = courseFiles.map(f => {
        const folders = loadFileFolders();
        const folder = folders.find(fl => fl.id === f.folderId);
        const category = f.fileCategory || '课程课件';
        const tags = loadNotesTags();
        const fileTagIds = f.tagIds || [];
        const fileTags = tags.filter(t => fileTagIds.includes(t.id));
        const tagsHtml = fileTags.map(t => `<span class="file-tag" style="background-color: ${t.color}20; border-color: ${t.color};">${t.name}</span>`).join('');

        return `
        <div class="uploaded-file-item">
          <span class="file-icon">${getFileIcon(f.type)}</span>
          <div class="file-info">
            <span class="file-name">${f.filename}</span>
            ${folder ? `<span class="file-folder-tag">📁 ${folder.name}</span>` : ''}
            <span class="file-category-tag">📂 ${category}</span>
            ${tagsHtml ? `<div class="file-tags">${tagsHtml}</div>` : ''}
          </div>
          <span class="file-date">${new Date(f.uploadDate).toLocaleDateString()}</span>
          <button type="button" class="file-action-btn" onclick="previewFile('${f.id}')">预览</button>
          <button type="button" class="file-action-btn" onclick="openFileTagsModal('${f.id}')">🏷️</button>
          <button type="button" class="file-action-btn" onclick="openMoveFileModal('${f.id}')">移动</button>
          <button type="button" class="file-action-btn file-delete-btn" onclick="deleteUploadedFile('${f.id}')">删除</button>
        </div>
      `}).join('');
    }

    // 获取文件图标
    function getFileIcon(type) {
      if (type === 'pdf') return '📕';
      if (type === 'md') return '📝';
      return '📄';
    }

    // 打开移动文件模态框
    function openMoveFileModal(fileId) {
      movingFileId = fileId;
      const folders = loadFileFolders();
      const currentCourse = document.getElementById('courseSelect').value;
      const courseFolders = folders.filter(f => f.courseId === currentCourse);

      const selectList = document.getElementById('folderSelectList');
      if (courseFolders.length === 0) {
        selectList.innerHTML = '<p class="text-muted">暂无文件夹，请先创建文件夹</p>';
      } else {
        selectList.innerHTML = courseFolders.map(f => `
          <label class="folder-option">
            <input type="radio" name="targetFolder" value="${f.id}"> 📁 ${f.name}
          </label>
        `).join('');
      }

      document.getElementById('moveFileModal').style.display = 'flex';
    }

    // 关闭移动文件模态框
    function closeMoveFileModal() {
      document.getElementById('moveFileModal').style.display = 'none';
      movingFileId = null;
    }

    // 确认移动文件
    function confirmMoveFile() {
      if (!movingFileId) return;
      const selected = document.querySelector('input[name="targetFolder"]:checked');
      const targetFolder = selected ? selected.value : '';

      const files = loadUploadedFilesMeta();
      const file = files.find(f => f.id === movingFileId);
      if (file) {
        file.folderId = targetFolder;
        saveUploadedFilesMeta(files);
        renderUploadedFiles();
      }
      closeMoveFileModal();
    }

    // 处理文件上传
    function handleFileUpload(event) {
      const file = event.target.files[0];
      if (!file) return;

      const courseId = document.getElementById('courseSelect').value;
      const extension = file.name.split('.').pop().toLowerCase();

      // 让用户选择文件类别
      const fileCategory = prompt('请选择文件类别：\n1 - 课程笔记\n2 - 课程课件\n3 - 课程作业文件\n\n输入数字或直接回车默认选择"课程课件"：', '2');
      if (fileCategory === null) return; // 用户取消

      const categoryMap = { '1': '课程笔记', '2': '课程课件', '3': '课程作业文件' };
      const categoryFolder = categoryMap[fileCategory] || '课程课件';
      const githubPath = getUploadGitHubPath(courseId, categoryFolder);

      const reader = new FileReader();
      reader.onload = function(e) {
        const filesMeta = loadUploadedFilesMeta();
        const fileMeta = {
          id: 'file_' + Date.now(),
          filename: file.name,
          courseId,
          folderId: currentFolder,
          fileCategory: categoryFolder,
          type: extension === 'pdf' ? 'pdf' : (extension === 'md' ? 'md' : 'txt'),
          uploadDate: new Date().toISOString(),
          content: extension !== 'pdf' ? e.target.result : null,
          tagIds: [] // 新增：文件关联的标签ID数组
        };
        filesMeta.push(fileMeta);
        saveUploadedFilesMeta(filesMeta);

        // 如果是 Markdown 文件，追加到笔记
        if (extension === 'md') {
          const textarea = document.getElementById('notesTextarea');
          const content = '\n\n---\n# ' + file.name + '\n\n' + e.target.result;
          textarea.value += content;
        }

        renderUploadedFiles();
        alert(`文件上传成功！\n\n请将文件上传到 GitHub 对应文件夹：\n${githubPath}`);
      };

      if (extension === 'pdf') {
        // PDF 文件只存储元数据，实际文件不存储（太大了）
        const filesMeta = loadUploadedFilesMeta();
        const fileMeta = {
          id: 'file_' + Date.now(),
          filename: file.name,
          courseId,
          folderId: currentFolder,
          fileCategory: categoryFolder,
          type: 'pdf',
          uploadDate: new Date().toISOString()
        };
        filesMeta.push(fileMeta);
        saveUploadedFilesMeta(filesMeta);
        renderUploadedFiles();
        alert(`PDF 上传成功！\n\n请将文件上传到 GitHub 对应文件夹：\n${githubPath}`);
      } else {
        reader.readAsText(file);
      }

      event.target.value = '';
    }

    // 预览文件
    function previewFile(fileId) {
      const files = loadUploadedFilesMeta();
      const file = files.find(f => f.id === fileId);
      if (!file) return;

      if (file.type === 'pdf') {
        // 显示 PDF 信息和下载链接
        const categoryFolder = file.fileCategory || '课程课件';
        const githubUrl = getUploadGitHubPath(file.courseId, categoryFolder);
        alert(`📕 ${file.filename}\n\n文件已记录，请前往 GitHub 上传：\n${githubUrl}\n\n上传后点击"在新窗口打开"查看。`);
        return;
      }

      // 显示 Markdown/文本内容
      const textarea = document.getElementById('notesTextarea');
      const preview = document.getElementById('notesPreview');
      const markdownBody = preview.querySelector('.markdown-body');

      textarea.value = file.content;
      markdownBody.innerHTML = marked.parse(file.content);

      // 切换到编辑/预览标签
      document.querySelectorAll('.notes-tab').forEach(t => t.classList.remove('active'));
      document.querySelector('.notes-tab[data-tab="preview"]').classList.add('active');
      document.getElementById('notesEditor').classList.add('notes-editor-hidden');
      document.getElementById('notesPreview').classList.remove('notes-preview-hidden');
    }

    // 删除文件
    function deleteUploadedFile(fileId) {
      if (!confirm('确定要删除这个文件吗？')) return;
      const files = loadUploadedFilesMeta();
      const filtered = files.filter(f => f.id !== fileId);
      saveUploadedFilesMeta(filtered);
      renderUploadedFiles();
    }

    // 初始化笔记页面
    document.addEventListener('DOMContentLoaded', function() {
      // 检查 URL 参数（课程选择由 script.js initNotes 处理）
      const urlParams = new URLSearchParams(window.location.search);
      const courseParam = urlParams.get('course');
      if (courseParam) {
        const courseSelect = document.getElementById('courseSelect');
        if (courseSelect) courseSelect.value = courseParam;
      }

      // 渲染文件夹导航和文件列表
      renderFolderNav();
      renderUploadedFiles();

      // 新建文件夹按钮
      document.getElementById('addFolderBtn').addEventListener('click', openAddFolderModal);

      // 新建文件夹表单
      document.getElementById('addFolderForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const name = document.getElementById('folderName').value.trim();
        if (name) {
          createFolder(name);
          closeAddFolderModal();
        }
      });

      // 文件上传按钮事件
      document.getElementById('uploadFileBtn').addEventListener('click', function() {
        document.getElementById('fileInput').click();
      });

      document.getElementById('fileInput').addEventListener('change', handleFileUpload);

      // 渲染标签列表
      renderTagsList();

      // 添加标签表单
      document.getElementById('addTagForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const name = document.getElementById('tagName').value.trim();
        const color = document.getElementById('tagColor').value;
        if (name) {
          createTag(name, color);
          closeAddTagModal();
        }
      });

      // 课程切换时刷新文件夹导航、标签和文件列表
      const courseSelect = document.getElementById('courseSelect');
      if (courseSelect) {
        courseSelect.addEventListener('change', function() {
          currentFolder = '';
          renderFolderNav();
          renderTagsList();
          renderUploadedFiles();
        });
      }
    });
  </script>
</body>
</html>
